<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plataforma Educativa · A.T. Priscila Ibazeta</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#faf8f4;color:#1e3a5f;min-height:100vh}
.pf{font-family:'Playfair Display',Georgia,serif}
:root{--navy:#1e3a5f;--navy2:#2c4a7c;--gold:#c9a84c;--gold-light:#f5edda;--cream:#faf8f4}
input,select,textarea{font-family:'Inter',sans-serif;font-size:13px;color:var(--navy);border:0.5px solid rgba(30,58,95,0.2);border-radius:7px;padding:9px 12px;width:100%;outline:none;background:white}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
textarea{resize:vertical}
button{font-family:'Inter',sans-serif;cursor:pointer}
.btn-primary{background:var(--navy);color:white;border:none;border-radius:7px;padding:9px 16px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.btn-primary:hover{background:var(--navy2)}
.btn-ghost{background:none;border:0.5px solid rgba(30,58,95,0.2);border-radius:7px;padding:7px 14px;font-size:12px;color:var(--navy)}
.btn-ghost:hover{background:var(--cream)}
.btn-icon{background:none;border:none;padding:4px 6px;border-radius:5px;color:#bbb;display:inline-flex;align-items:center}
.btn-icon:hover{background:rgba(30,58,95,0.06);color:var(--navy)}
.btn-icon.del:hover{background:#fceaea;color:#9b2c2c}
.card{background:white;border:0.5px solid rgba(30,58,95,0.12);border-radius:10px}
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 10px;border-radius:99px;white-space:nowrap}
.pill-gold{background:var(--gold-light);color:#7a5c1a}
.pill-green{background:#edf6e5;color:#2d5c14}
.pill-red{background:#fceaea;color:#7a1f1f}
.pill-amber{background:#fef3d8;color:#7a4d0a}
.pill-blue{background:#e6eff8;color:#1a3f6f}
.pill-gray{background:#f2f0eb;color:#4a4a40}
.metric{background:var(--cream);border-radius:9px;padding:14px 16px}
.tab-btn{display:flex;align-items:center;gap:9px;padding:9px 16px;width:100%;background:none;border:none;border-left:2px solid transparent;font-size:13px;color:#8a8a80;font-weight:400;text-align:left}
.tab-btn:hover{color:var(--navy);background:rgba(30,58,95,0.04)}
.tab-btn.active{color:var(--navy);font-weight:500;background:white;border-left-color:var(--gold)}
.field-label{font-size:11px;color:#8a8a80;display:block;margin-bottom:5px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase}
.gold-line{width:28px;height:2px;background:var(--gold);border-radius:2px;margin-bottom:10px}
.overlay{position:fixed;inset:0;background:rgba(10,20,40,0.35);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding-top:40px;overflow-y:auto}
.modal{background:white;border:0.5px solid rgba(30,58,95,0.12);border-radius:10px;width:460px;max-width:95vw;padding:1.75rem;margin-bottom:40px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.empty{text-align:center;padding:3rem 1rem;color:#aaa;font-size:13px}
.avatar{border-radius:50%;background:var(--gold-light);display:flex;align-items:center;justify-content:center;font-weight:500;color:var(--navy);flex-shrink:0}
#app{display:flex;min-height:100vh}
#sidebar{width:220px;background:white;border-right:0.5px solid rgba(30,58,95,0.1);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:10;transition:transform 0.2s}
#main{flex:1;padding:1.75rem;margin-left:220px;min-width:0}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%}
.loading{text-align:center;padding:3rem;color:#aaa;font-size:13px}
.spinner{width:20px;height:20px;border:2px solid rgba(30,58,95,0.15);border-top-color:var(--navy);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:640px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0;padding:1rem}
  #mobile-header{display:flex}
  .grid2{grid-template-columns:1fr}
  .modal{width:95vw;padding:1.25rem}
  .metrics-grid{grid-template-columns:1fr 1fr!important}
}
#mobile-header{display:none;align-items:center;justify-content:space-between;padding:12px 16px;background:white;border-bottom:0.5px solid rgba(30,58,95,0.1);position:sticky;top:0;z-index:9}
#overlay-close{display:none;position:fixed;inset:0;z-index:9;background:rgba(0,0,0,0.2)}
</style>
</head>
<body>

<div id="login-screen">
  <div style="width:380px;padding:1rem">
    <div style="text-align:center;margin-bottom:2.5rem">
      <div style="width:60px;height:60px;border-radius:14px;background:var(--navy);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:26px">🤝</div>
      <h1 class="pf" style="font-size:22px;font-weight:600;color:var(--navy)">Plataforma Educativa</h1>
      <p style="font-size:13px;font-weight:500;color:var(--navy);letter-spacing:0.08em;text-transform:uppercase;margin-top:6px">A.T. Priscila Ibazeta</p>
      <div style="width:32px;height:2px;background:var(--gold);border-radius:2px;margin:10px auto 8px"></div>
      <p style="font-size:12px;color:#8a8a80;font-weight:300;letter-spacing:0.05em;text-transform:uppercase">Seguimiento terapéutico</p>
    </div>
    <div class="card" style="padding:2rem">
      <div style="margin-bottom:14px">
        <label class="field-label">Usuario</label>
        <select id="login-user">
          <option value="admin">Administrador</option>
          <option value="equipo">Equipo Externo</option>
          <option value="familia">Familia / Tutor</option>
        </select>
      </div>
      <div id="pac-select-wrap" style="margin-bottom:14px;display:none">
        <label class="field-label">Paciente asignado</label>
        <select id="login-pac-select"></select>
      </div>
      <div style="margin-bottom:14px">
        <label class="field-label">Contraseña</label>
        <input type="password" id="login-pw" placeholder="Ingresá tu contraseña"/>
      </div>
      <div id="login-err" style="color:#9b2c2c;font-size:12px;margin-bottom:10px;display:none"></div>
      <button class="btn-primary" onclick="doLogin()" style="width:100%;justify-content:center;padding:11px;font-size:14px">Ingresar</button>
      <p style="font-size:11px;color:#bbb;margin-top:12px">Contraseñas: admin123 · equipo123 · fam123</p>
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <div id="mobile-header">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:28px;height:28px;border-radius:7px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:14px">🤝</div>
      <span class="pf" style="font-size:13px;font-weight:600;color:var(--navy)">Plataforma Educativa</span>
    </div>
    <button class="btn-icon" onclick="toggleSidebar()" style="font-size:20px;padding:4px 8px">☰</button>
  </div>
  <div id="overlay-close" onclick="closeSidebar()"></div>
  <aside id="sidebar">
    <div style="padding:1.25rem 1rem 1rem;border-bottom:0.5px solid rgba(30,58,95,0.08)">
      <div style="display:flex;align-items:center;gap:9px">
        <div style="width:34px;height:34px;border-radius:8px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">🤝</div>
        <div>
          <p class="pf" style="font-size:13px;font-weight:600;color:var(--navy);line-height:1.2">Plataforma</p>
          <p style="font-size:10px;color:#aaa;font-weight:300">Educativa</p>
        </div>
      </div>
    </div>
    <div id="pac-filtro-wrap" style="padding:0.75rem">
      <label class="field-label">Paciente</label>
      <select id="pac-filtro" onchange="renderTab()" style="font-size:12px;padding:7px 10px">
        <option value="">Todos</option>
      </select>
    </div>
    <nav id="sidebar-nav" style="flex:1;padding-top:4px"></nav>
    <div style="padding:0.75rem 1rem;border-top:0.5px solid rgba(30,58,95,0.08)">
      <div id="user-info" style="display:flex;align-items:center;gap:8px;margin-bottom:8px"></div>
      <button class="btn-ghost" onclick="doLogout()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:5px">← Salir</button>
    </div>
  </aside>
  <main id="main">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px">
      <div><div class="gold-line"></div><h2 class="pf" id="tab-title" style="font-size:20px;font-weight:500;color:var(--navy)"></h2><p id="tab-sub" style="font-size:12px;color:#aaa;margin-top:3px"></p></div>
      <button id="add-btn" class="btn-primary" onclick="openNew()" style="display:none">+ Agregar</button>
    </div>
    <div id="content"></div>
  </main>
</div>

<div id="modal-overlay" class="overlay" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal-box"></div>
</div>

<script>
const SB_URL = 'https://tjqzsvottuqakkoenirb.supabase.co';
const SB_KEY = 'sb_publishable_CdgDKMDM2jiRsEap4gOIWw_MsfHx9dp';

const PASSWORDS = { admin: 'admin123', equipo: 'equipo123', familia: 'fam123' };
const CAN_SEE = {
  admin: ['pacientes','notas','asistencias','conductas','informes','gastos','calendario'],
  equipo: ['pacientes','conductas','informes'],
  familia: ['pacientes','asistencias','conductas','informes','calendario']
};
const TAB_LABELS = { pacientes:'Pacientes', notas:'Notas', asistencias:'Asistencias', conductas:'Conductas', informes:'Informes', gastos:'Gastos', calendario:'Calendario' };
const TAB_ICONS = { pacientes:'👤', notas:'📝', asistencias:'📅', conductas:'💬', informes:'📁', gastos:'💰', calendario:'🗓' };
const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

let currentUser = null;
let currentRole = null;
let currentPacId = null;
let currentTab = 'pacientes';
let pacientes = [];
let editItem = null;

async function sbFetch(path, opts = {}) {
  const res = await fetch(SB_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...opts.headers },
    ...opts
  });
  if (!res.ok) { const e = await res.text(); console.error(e); return null; }
  const txt = await res.text();
  return txt ? JSON.parse(txt) : [];
}

async function dbGet(table, extra='') { return await sbFetch(table+'?order=created_at.asc'+extra) || []; }
async function dbInsert(table, data) { return await sbFetch(table, { method:'POST', body:JSON.stringify(data) }); }
async function dbUpdate(table, id, data) { return await sbFetch(table+'?id=eq.'+id, { method:'PATCH', body:JSON.stringify(data) }); }
async function dbDelete(table, id) { return await sbFetch(table+'?id=eq.'+id, { method:'DELETE' }); }

document.getElementById('login-user').addEventListener('change', function() {
  document.getElementById('pac-select-wrap').style.display = this.value==='familia' ? 'block' : 'none';
  if (this.value==='familia') loadPacsForLogin();
});

async function loadPacsForLogin() {
  const pacs = await dbGet('pacientes');
  const sel = document.getElementById('login-pac-select');
  sel.innerHTML = pacs.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');
}

async function doLogin() {
  const role = document.getElementById('login-user').value;
  const pw = document.getElementById('login-pw').value;
  const err = document.getElementById('login-err');
  if (pw !== PASSWORDS[role]) { err.textContent='Contraseña incorrecta'; err.style.display='block'; return; }
  err.style.display='none';
  currentRole = role;
  currentUser = { admin:'Administrador', equipo:'Equipo Externo', familia:'Familia/Tutor' }[role];
  currentPacId = role==='familia' ? document.getElementById('login-pac-select').value : null;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  await initApp();
}

document.getElementById('login-pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function initApp() {
  pacientes = await dbGet('pacientes');
  buildSidebar();
  buildPacFiltro();
  currentTab = CAN_SEE[currentRole][0];
  renderTab();
}

function buildSidebar() {
  document.getElementById('sidebar-nav').innerHTML = CAN_SEE[currentRole].map(t=>`
    <button class="tab-btn${t===currentTab?' active':''}" id="tab-${t}" onclick="switchTab('${t}')">
      <span>${TAB_ICONS[t]}</span> ${TAB_LABELS[t]}
    </button>`).join('');
  const initials = currentUser.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('user-info').innerHTML = `
    <div class="avatar" style="width:30px;height:30px;font-size:11px">${initials}</div>
    <div><p style="font-size:12px;font-weight:500;color:var(--navy)">${currentUser}</p>
    <span class="pill pill-gold" style="font-size:10px">${currentRole}</span></div>`;
  if (currentRole==='familia') document.getElementById('pac-filtro-wrap').style.display='none';
}

function buildPacFiltro() {
  const sel = document.getElementById('pac-filtro');
  sel.innerHTML = '<option value="">Todos</option>' + pacientes.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');
  if (currentPacId) sel.value = currentPacId;
}

function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('tab-'+t);
  if (btn) btn.classList.add('active');
  closeSidebar();
  renderTab();
}

function getPacFiltro() {
  if (currentRole==='familia') return currentPacId;
  return document.getElementById('pac-filtro').value || null;
}

function nomPac(id) { return (pacientes.find(x=>x.id===id)||{}).nombre || 'General'; }
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay-close').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay-close').style.display='none';
}
function doLogout() {
  currentUser=null; currentRole=null; currentPacId=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-pw').value='';
}

async function renderTab() {
  document.getElementById('tab-title').textContent = TAB_LABELS[currentTab];
  const pf = getPacFiltro();
  document.getElementById('tab-sub').textContent = pf ? nomPac(pf) : '';
  const addBtn = document.getElementById('add-btn');
  addBtn.style.display = (currentRole!=='familia' && currentTab!=='pacientes') || (currentRole==='admin' && currentTab==='pacientes') ? 'flex' : 'none';
  if (currentTab==='pacientes' && currentRole!=='admin') addBtn.style.display='none';
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><span class="spinner"></span>Cargando...</div>';
  if (currentTab==='pacientes') await renderPacientes(content);
  else if (currentTab==='notas') await renderNotas(content, pf);
  else if (currentTab==='asistencias') await renderAsistencias(content, pf);
  else if (currentTab==='conductas') await renderConductas(content, pf);
  else if (currentTab==='informes') await renderInformes(content, pf);
  else if (currentTab==='gastos') await renderGastos(content, pf);
  else if (currentTab==='calendario') await renderCalendario(content, pf);
}

function openNew() {
  editItem = null;
  if (currentTab === 'calendario' && calDiaSeleccionado) {
    const mm = String(calMonth+1).padStart(2,'0');
    const dd = String(calDiaSeleccionado).padStart(2,'0');
    editItem = { _prefill: true, fecha: `${calYear}-${mm}-${dd}` };
  }
  openModal(currentTab==='pacientes'?'paciente':{notas:'nota',asistencias:'asistencia',conductas:'conducta',informes:'informe',gastos:'gasto',calendario:'evento'}[currentTab]);
  if (editItem?._prefill) editItem = null;
}
function openEdit(tipo, item) { editItem=item; openModal(tipo); }
async function doDelete(table, id) { if(!confirm('¿Eliminar este registro?')) return; await dbDelete(table,id); renderTab(); }

async function renderPacientes(el) {
  pacientes = await dbGet('pacientes');
  if (!pacientes.length) { el.innerHTML='<div class="empty">Sin pacientes registrados</div>'; return; }
  el.innerHTML = pacientes.map(p=>`
    <div class="card" style="padding:1rem 1.25rem;display:flex;align-items:center;gap:14px;margin-bottom:10px">
      <div class="avatar" style="width:46px;height:46px;font-size:15px">${p.nombre.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()}</div>
      <div style="flex:1;min-width:0">
        <p class="pf" style="font-size:15px;font-weight:500;color:var(--navy)">${p.nombre}</p>
        <p style="font-size:12px;color:#888;margin-top:2px">${p.institucion||''} · ${p.edad||''} años</p>
        <p style="font-size:12px;color:#aaa;margin-top:1px">${p.diagnostico||''}</p>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <p style="font-size:10px;color:#bbb;text-transform:uppercase;letter-spacing:0.05em;font-weight:500">Contacto</p>
        <p style="font-size:12px;color:#666;margin-top:3px">${p.contacto||''}</p>
      </div>
      ${currentRole==='admin'?`<div style="display:flex;gap:2px;flex-shrink:0"><button class="btn-icon" onclick='openEdit("paciente",${JSON.stringify(p)})'>✏️</button><button class="btn-icon del" onclick="doDelete('pacientes','${p.id}')">🗑</button></div>`:''}
    </div>`).join('');
}

async function renderNotas(el, pf) {
  let data = await dbGet('notas');
  if (pf) data = data.filter(x=>x.paciente_id===pf);
  if (!data.length) { el.innerHTML='<div class="empty">Sin notas registradas</div>'; return; }
  el.innerHTML = data.map(n=>`
    <div class="card" style="padding:10px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <div style="width:44px;height:44px;border-radius:9px;background:${n.nota>=7?'#edf6e5':'#fceaea'};display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:19px;font-weight:500;color:${n.nota>=7?'#2d5c14':'#7a1f1f'};flex-shrink:0">${n.nota}</div>
      <div style="flex:1">
        <p style="font-weight:500;font-size:14px;color:var(--navy)">${n.materia||''}</p>
        <p style="font-size:12px;color:#999;margin-top:2px">${nomPac(n.paciente_id)} · ${n.fecha||''}</p>
        ${n.obs?`<p style="font-size:12px;color:#aaa;margin-top:1px">${n.obs}</p>`:''}
      </div>
      <span class="pill ${n.nota>=7?'pill-green':'pill-red'}">${n.nota>=7?'aprobado':'desaprobado'}</span>
      ${currentRole==='admin'?`<div style="display:flex;gap:2px"><button class="btn-icon" onclick='openEdit("nota",${JSON.stringify(n)})'>✏️</button><button class="btn-icon del" onclick="doDelete('notas','${n.id}')">🗑</button></div>`:''}
    </div>`).join('');
}

async function renderAsistencias(el, pf) {
  let data = await dbGet('asistencias');
  if (pf) data = data.filter(x=>x.paciente_id===pf);
  const cnt = e => data.filter(a=>a.estado===e).length;
  const pres=cnt('presente'), aus=cnt('ausente'), just=cnt('justificado'), tot=data.length;
  el.innerHTML = `
    <div class="metrics-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">
      ${[['Presentes',pres],['Ausentes',aus],['Justificados',just]].map(([l,v])=>`
        <div class="metric"><p style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;font-weight:500;margin-bottom:4px">${l}</p>
        <p class="pf" style="font-size:24px;font-weight:500;color:var(--navy)">${v}</p>
        ${tot?`<p style="font-size:11px;color:#bbb;margin-top:2px">${Math.round(v*100/tot)}%</p>`:''}</div>`).join('')}
    </div>
    ${data.length?data.map(a=>`
    <div class="card" style="padding:10px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <div style="width:7px;height:7px;border-radius:50%;background:${a.estado==='presente'?'#639922':a.estado==='ausente'?'#e24b4a':'#ef9f27'};flex-shrink:0"></div>
      <div style="flex:1"><p style="font-weight:500;font-size:14px;color:var(--navy)">${nomPac(a.paciente_id)}</p><p style="font-size:12px;color:#999;margin-top:1px">${a.fecha||''}</p></div>
      <span class="pill ${a.estado==='presente'?'pill-green':a.estado==='ausente'?'pill-red':'pill-amber'}">${a.estado}</span>
      ${currentRole==='admin'?`<div style="display:flex;gap:2px"><button class="btn-icon" onclick='openEdit("asistencia",${JSON.stringify(a)})'>✏️</button><button class="btn-icon del" onclick="doDelete('asistencias','${a.id}')">🗑</button></div>`:''}
    </div>`).join(''):'<div class="empty">Sin asistencias registradas</div>'}`;
}

async function renderConductas(el, pf) {
  let data = await dbGet('conductas');
  if (pf) data = data.filter(x=>x.paciente_id===pf);
  if (!data.length) { el.innerHTML='<div class="empty">Sin conductas registradas</div>'; return; }
  el.innerHTML = data.map(c=>`
    <div class="card" style="padding:12px 16px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;align-items:flex-start">
        <div><p style="font-weight:500;font-size:14px;color:var(--navy)">${nomPac(c.paciente_id)}</p><p style="font-size:11px;color:#bbb;margin-top:1px">${c.fecha||''}</p></div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="pill ${c.tipo==='positivo'?'pill-green':c.tipo==='negativo'?'pill-red':'pill-amber'}">${c.tipo||''}</span>
          ${currentRole==='admin'?`<div style="display:flex;gap:2px"><button class="btn-icon" onclick='openEdit("conducta",${JSON.stringify(c)})'>✏️</button><button class="btn-icon del" onclick="doDelete('conductas','${c.id}')">🗑</button></div>`:''}
        </div>
      </div>
      <p style="font-size:13px;color:#666;line-height:1.55">${c.descripcion||''}</p>
    </div>`).join('');
}

async function renderInformes(el, pf) {
  let data = await dbGet('informes');
  if (pf) data = data.filter(x=>x.paciente_id===pf);
  if (!data.length) { el.innerHTML='<div class="empty">Sin documentos cargados</div>'; return; }
  el.innerHTML = data.map(inf=>`
    <div class="card" style="padding:10px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <div style="width:40px;height:40px;border-radius:9px;background:var(--gold-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px">📄</div>
      <div style="flex:1;min-width:0">
        <p style="font-weight:500;font-size:13px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${inf.nombre||''}</p>
        <p style="font-size:12px;color:#999;margin-top:2px">${nomPac(inf.paciente_id)} · ${inf.fecha||''}</p>
      </div>
      <span class="pill pill-blue">${inf.categoria||''}</span>
      ${currentRole==='admin'?`<div style="display:flex;gap:2px"><button class="btn-icon" onclick='openEdit("informe",${JSON.stringify(inf)})'>✏️</button><button class="btn-icon del" onclick="doDelete('informes','${inf.id}')">🗑</button></div>`:''}
    </div>`).join('');
}

async function renderGastos(el, pf) {
  let data = await dbGet('gastos');
  if (pf) data = data.filter(x=>x.paciente_id===pf);
  const total=data.reduce((s,g)=>s+Number(g.monto),0);
  const hon=data.filter(g=>g.tipo==='honorario').reduce((s,g)=>s+Number(g.monto),0);
  const mat=data.filter(g=>g.tipo==='material').reduce((s,g)=>s+Number(g.monto),0);
  el.innerHTML = `
    <div class="metrics-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">
      ${[['Total',total],['Honorarios',hon],['Materiales',mat]].map(([l,v])=>`
        <div class="metric"><p style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;font-weight:500;margin-bottom:4px">${l}</p>
        <p class="pf" style="font-size:22px;font-weight:500;color:var(--navy)">$${v.toLocaleString()}</p></div>`).join('')}
    </div>
    ${data.length?data.map(g=>`
    <div class="card" style="padding:10px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <div style="flex:1"><p style="font-weight:500;font-size:14px;color:var(--navy)">${g.concepto||''}</p><p style="font-size:12px;color:#999;margin-top:2px">${nomPac(g.paciente_id)} · ${g.fecha||''}</p></div>
      <div style="text-align:right"><p class="pf" style="font-size:16px;font-weight:500;color:var(--navy)">$${Number(g.monto).toLocaleString()}</p><span class="pill ${g.tipo==='honorario'?'pill-gold':'pill-blue'}">${g.tipo||''}</span></div>
      ${currentRole==='admin'?`<div style="display:flex;gap:2px"><button class="btn-icon" onclick='openEdit("gasto",${JSON.stringify(g)})'>✏️</button><button class="btn-icon del" onclick="doDelete('gastos','${g.id}')">🗑</button></div>`:''}
    </div>`).join(''):'<div class="empty">Sin gastos registrados</div>'}`;
}

let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let calEventos = [];
let calDiaSeleccionado = null;

async function renderCalendario(el, pf) {
  calEventos = await dbGet('eventos');
  if (pf) calEventos = calEventos.filter(x => x.paciente_id === pf || !x.paciente_id);
  renderCalendarioUI(el);
}

function renderCalendarioUI(el) {
  const hoy = new Date();
  const primerDia = new Date(calYear, calMonth, 1).getDay();
  const diasEnMes = new Date(calYear, calMonth + 1, 0).getDate();
  const offset = primerDia === 0 ? 6 : primerDia - 1;

  // Eventos por día
  const eventosPorDia = {};
  calEventos.forEach(ev => {
    if (!ev.fecha) return;
    const [y, m, d] = ev.fecha.split('-');
    if (parseInt(y) === calYear && parseInt(m) - 1 === calMonth) {
      const dia = parseInt(d);
      if (!eventosPorDia[dia]) eventosPorDia[dia] = [];
      eventosPorDia[dia].push(ev);
    }
  });

  // Eventos del día seleccionado
  const evsDia = calDiaSeleccionado ? (eventosPorDia[calDiaSeleccionado] || []) : [];
  const fechaStr = calDiaSeleccionado ? `${String(calDiaSeleccionado).padStart(2,'0')}/${String(calMonth+1).padStart(2,'0')}/${calYear}` : '';

  let celdas = '';
  for (let i = 0; i < offset; i++) celdas += `<div></div>`;
  for (let d = 1; d <= diasEnMes; d++) {
    const esHoy = d === hoy.getDate() && calMonth === hoy.getMonth() && calYear === hoy.getFullYear();
    const esSel = d === calDiaSeleccionado;
    const evs = eventosPorDia[d] || [];
    const puntos = evs.slice(0,3).map(ev => {
      const color = ev.tipo==='sesion'?'#c9a84c':ev.tipo==='reunion'?'#4a90d9':'#aaa';
      return `<div style="width:5px;height:5px;border-radius:50%;background:${color};flex-shrink:0"></div>`;
    }).join('');
    celdas += `
      <div onclick="selDia(${d})" style="cursor:pointer;border-radius:8px;padding:6px 4px;text-align:center;background:${esSel?'var(--navy)':esHoy?'var(--gold-light)':'transparent'};border:${esHoy&&!esSel?'1px solid var(--gold)':'1px solid transparent'};transition:background 0.1s">
        <p style="font-size:13px;font-weight:${esHoy||esSel?'600':'400'};color:${esSel?'white':esHoy?'var(--navy)':'var(--navy)'};line-height:1;margin-bottom:4px">${d}</p>
        <div style="display:flex;justify-content:center;gap:2px;min-height:6px">${puntos}</div>
      </div>`;
  }

  el.innerHTML = `
    <div class="card" style="padding:1.25rem;margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <button onclick="cambiarMes(-1)" class="btn-ghost" style="padding:5px 12px;font-size:16px">‹</button>
        <p class="pf" style="font-size:16px;font-weight:500;color:var(--navy)">${MESES[calMonth]} ${calYear}</p>
        <button onclick="cambiarMes(1)" class="btn-ghost" style="padding:5px 12px;font-size:16px">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px">
        ${['Lu','Ma','Mi','Ju','Vi','Sa','Do'].map(d=>`<div style="text-align:center;font-size:11px;font-weight:500;color:#aaa;padding:4px 0">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
        ${celdas}
      </div>
    </div>

    ${calDiaSeleccionado ? `
    <div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
      <div><div class="gold-line"></div><p class="pf" style="font-size:15px;color:var(--navy)">${fechaStr}</p></div>
      ${currentRole!=='familia'?`<button class="btn-primary" onclick="openNew()" style="font-size:12px;padding:6px 12px">+ Agregar</button>`:''}
    </div>
    ${evsDia.length ? evsDia.map(ev=>`
    <div class="card" style="padding:10px 14px;display:flex;align-items:center;gap:14px;margin-bottom:8px">
      <div style="width:46px;height:46px;border-radius:9px;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
        <p class="pf" style="font-size:16px;font-weight:500;color:var(--gold);line-height:1">${String(calDiaSeleccionado).padStart(2,'0')}</p>
        <p style="font-size:10px;color:rgba(255,255,255,0.5);font-weight:300">${MESES[calMonth]}</p>
      </div>
      <div style="flex:1">
        <p style="font-weight:500;font-size:14px;color:var(--navy)">${ev.titulo||''}</p>
        <p style="font-size:12px;color:#999;margin-top:2px">🕐 ${ev.hora||''} · ${ev.paciente_id?nomPac(ev.paciente_id):'General'}</p>
      </div>
      <span class="pill ${ev.tipo==='sesion'?'pill-gold':ev.tipo==='reunion'?'pill-blue':'pill-gray'}">${ev.tipo||''}</span>
      ${currentRole==='admin'?`<div style="display:flex;gap:2px"><button class="btn-icon" onclick='openEdit("evento",${JSON.stringify(ev)})'>✏️</button><button class="btn-icon del" onclick="doDelete('eventos','${ev.id}')">🗑</button></div>`:''}
    </div>`).join('') : `<div class="empty" style="padding:1.5rem">Sin eventos este día</div>`}
    ` : `<div class="empty">Hacé clic en un día para ver sus eventos</div>`}`;
}

function selDia(d) {
  calDiaSeleccionado = calDiaSeleccionado === d ? null : d;
  renderCalendarioUI(document.getElementById('content'));
}

function cambiarMes(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  calDiaSeleccionado = null;
  renderCalendarioUI(document.getElementById('content'));
}

function f(key, placeholder='', type='text', opts=null) {
  const val = editItem ? (editItem[key]??'') : '';
  if (opts) return `<select id="f-${key}">${opts.map(o=>`<option value="${o.v}"${val===o.v?'selected':''}>${o.l}</option>`).join('')}</select>`;
  if (type==='textarea') return `<textarea id="f-${key}" style="height:75px">${val}</textarea>`;
  return `<input type="${type}" id="f-${key}" value="${String(val)}" placeholder="${placeholder}"/>`;
}
function fld(label,inner){return `<div style="margin-bottom:14px"><label class="field-label">${label}</label>${inner}</div>`;}
function pacOpts(){return [{v:'',l:'Seleccionar'},...pacientes.map(p=>({v:p.id,l:p.nombre}))];}

function openModal(tipo) {
  const isEdit = !!editItem;
  const titles = {nota:isEdit?'Editar nota':'Nueva nota',asistencia:isEdit?'Editar asistencia':'Registrar asistencia',conducta:isEdit?'Editar conducta':'Registrar conducta',informe:isEdit?'Editar informe':'Cargar documento',gasto:isEdit?'Editar gasto':'Agregar gasto',evento:isEdit?'Editar evento':'Nuevo evento',paciente:isEdit?'Editar paciente':'Nuevo paciente'};
  let body='';
  if(tipo==='paciente'){body=fld('Nombre',f('nombre'))+fld('Edad',f('edad','','number'))+fld('Institución',f('institucion'))+fld('Diagnóstico',f('diagnostico'))+fld('Contacto',f('contacto'));}
  else if(tipo==='nota'){body=fld('Paciente',f('paciente_id','','text',pacOpts()))+`<div class="grid2">${fld('Fecha',f('fecha','','date'))}${fld('Nota (1-10)',f('nota','','number'))}</div>`+fld('Materia',f('materia'))+fld('Observaciones',f('obs','','textarea'));}
  else if(tipo==='asistencia'){body=fld('Paciente',f('paciente_id','','text',pacOpts()))+fld('Fecha',f('fecha','','date'))+fld('Estado',f('estado','','text',[{v:'presente',l:'Presente'},{v:'ausente',l:'Ausente'},{v:'justificado',l:'Justificado'}]));}
  else if(tipo==='conducta'){body=fld('Paciente',f('paciente_id','','text',pacOpts()))+`<div class="grid2">${fld('Fecha',f('fecha','','date'))}${fld('Tipo',f('tipo','','text',[{v:'positivo',l:'Positivo'},{v:'neutro',l:'Neutro'},{v:'negativo',l:'Negativo'}]))}</div>`+fld('Descripción',f('descripcion','','textarea'));}
  else if(tipo==='informe'){body=fld('Paciente',f('paciente_id','','text',pacOpts()))+`<div class="grid2">${fld('Fecha',f('fecha','','date'))}${fld('Categoría',f('categoria','','text',[{v:'Evaluación',l:'Evaluación'},{v:'Seguimiento',l:'Seguimiento'},{v:'Informe trimestral',l:'Informe trimestral'},{v:'Comunicación familia',l:'Comunicación familia'},{v:'Otro',l:'Otro'}]))}</div>`+fld('Nombre del documento',f('nombre'));}
  else if(tipo==='gasto'){body=fld('Paciente',f('paciente_id','','text',pacOpts()))+`<div class="grid2">${fld('Fecha',f('fecha','','date'))}${fld('Monto ($)',f('monto','','number'))}</div>`+fld('Concepto',f('concepto'))+fld('Tipo',f('tipo','','text',[{v:'honorario',l:'Honorario'},{v:'material',l:'Material'},{v:'otro',l:'Otro'}]));}
  else if(tipo==='evento'){const pe=[{v:'',l:'General'},...pacientes.map(p=>({v:p.id,l:p.nombre}))];body=fld('Paciente (opcional)',f('paciente_id','','text',pe))+`<div class="grid2">${fld('Fecha',f('fecha','','date'))}${fld('Hora',f('hora','','time'))}</div>`+fld('Título',f('titulo'))+fld('Tipo',f('tipo','','text',[{v:'sesion',l:'Sesión'},{v:'reunion',l:'Reunión'},{v:'otro',l:'Otro'}]));}
  document.getElementById('modal-box').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <p class="pf" style="font-size:16px;font-weight:500;color:var(--navy)">${titles[tipo]}</p>
      <button onclick="closeModal()" style="background:none;border:none;font-size:22px;color:#aaa;cursor:pointer;line-height:1">×</button>
    </div>${body}
    <button class="btn-primary" onclick="saveModal('${tipo}')" style="width:100%;justify-content:center;padding:11px;margin-top:4px">Guardar</button>`;
  document.getElementById('modal-overlay').style.display='flex';
}

async function saveModal(tipo) {
  const gv = id => { const el=document.getElementById('f-'+id); return el?el.value:''; };
  const tableMap={paciente:'pacientes',nota:'notas',asistencia:'asistencias',conducta:'conductas',informe:'informes',gasto:'gastos',evento:'eventos'};
  const table=tableMap[tipo];
  let data={};
  if(tipo==='paciente') data={nombre:gv('nombre'),edad:gv('edad')||null,institucion:gv('institucion'),diagnostico:gv('diagnostico'),contacto:gv('contacto')};
  else if(tipo==='nota') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,materia:gv('materia'),nota:parseInt(gv('nota'))||null,obs:gv('obs')};
  else if(tipo==='asistencia') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,estado:gv('estado')};
  else if(tipo==='conducta') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,tipo:gv('tipo'),descripcion:gv('descripcion')};
  else if(tipo==='informe') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,categoria:gv('categoria'),nombre:gv('nombre')};
  else if(tipo==='gasto') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,concepto:gv('concepto'),monto:parseFloat(gv('monto'))||0,tipo:gv('tipo')};
  else if(tipo==='evento') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,hora:gv('hora'),titulo:gv('titulo'),tipo:gv('tipo')};
  if(editItem) await dbUpdate(table,editItem.id,data);
  else await dbInsert(table,data);
  if(tipo==='paciente') pacientes=await dbGet('pacientes');
  closeModal();
  renderTab();
}

function closeModal(){document.getElementById('modal-overlay').style.display='none';editItem=null;}
function handleOverlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
</script>
