<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:'Inter',sans-serif;background:
    radial-gradient(900px 640px at 4% -12%, color-mix(in oklab,var(--sage) 18%,transparent), transparent 58%),
    radial-gradient(820px 560px at 108% 2%, color-mix(in oklab,var(--accent) 12%,transparent), transparent 55%),
    radial-gradient(760px 660px at 98% 114%, color-mix(in oklab,var(--sage) 12%,transparent), transparent 56%),
    var(--cream);
  background-attachment:fixed;color:var(--navy);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .35s ease,color .35s ease}
.pf{font-family:'Fustat','Inter',sans-serif}
:root{
  --navy:#25352E;--navy2:#33473D;--gold:#C2764F;--gold-light:#F3E5DA;--cream:#F4F6F1;
  --sage:#5E9585;--sage-light:#E3EFEA;--warm:#E3B79A;--blush:#F1E6DD;
  --muted:#576158;--faint:#6E7A70;
  --primary:#2F6E5D;--primary-dark:#245646;--primary-soft:#E1EFE9;--accent:#C2764F;--teal:#5E9585;--surface:#FFFFFF;--surface-soft:#EDF2ED;
}
body[data-theme="salvia"]{
  --navy:#22302A;--navy2:#2E4238;--gold:#B0895A;--gold-light:#EFE7D8;--cream:#F5F6F0;
  --sage:#5A8C6E;--sage-light:#E4EDE4;--warm:#DBC3A6;--blush:#EEE6DB;
  --muted:#535E54;--faint:#6C776B;
  --primary:#3C6E52;--primary-dark:#2E5540;--primary-soft:#E2EDE5;--accent:#B0895A;--teal:#5A8C6E;--surface-soft:#EDF1EA;
}
body[data-theme="lavanda"]{
  --navy:#2E2740;--navy2:#473873;--gold:#B06A8F;--gold-light:#EFE2EC;--cream:#F7F5FB;
  --sage:#6E8BA8;--sage-light:#E7ECF2;--warm:#D6A0B8;--blush:#F1E4EE;
  --muted:#5B5470;--faint:#837B99;
  --primary:#5B4B8A;--primary-dark:#473873;--primary-soft:#EAE4F3;--accent:#B06A8F;--teal:#6E8BA8;--surface-soft:#F0EDF6;
}
body[data-theme="oceano"]{
  --navy:#173A3C;--navy2:#12484C;--gold:#C77A63;--gold-light:#F4E2DB;--cream:#F1F7F6;
  --sage:#3E9A90;--sage-light:#DEEFEB;--warm:#E0B49E;--blush:#F4E5DD;
  --muted:#4E605E;--faint:#6C7E7C;
  --primary:#1D6E73;--primary-dark:#134E52;--primary-soft:#DDEEEC;--accent:#C77A63;--teal:#3E9A90;--surface-soft:#E7F1F0;
}
.theme-dots{display:flex;gap:9px;align-items:center}
.theme-dot{width:22px;height:22px;border-radius:50%;border:2px solid #fff;cursor:pointer;padding:0;transition:transform .15s,box-shadow .15s;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.theme-dot:hover{transform:scale(1.18)}
.theme-dot.active{box-shadow:0 0 0 2px var(--navy)}
input,select,textarea{font-family:'Inter',sans-serif;font-size:13px;color:var(--navy);border:1px solid rgba(47,41,68,0.16);border-radius:9px;padding:10px 13px;width:100%;outline:none;background:white;transition:border-color .18s,box-shadow .18s}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px color-mix(in oklab,var(--accent) 22%,transparent)}
input::placeholder,textarea::placeholder{color:var(--muted);opacity:1}
textarea{resize:vertical}
button{font-family:'Inter',sans-serif;cursor:pointer}
.btn-primary{background:var(--primary);color:#fff;border:none;border-radius:11px;padding:11px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;box-shadow:0 6px 16px -8px color-mix(in oklab,var(--primary) 70%,transparent),inset 0 1px 0 rgba(255,255,255,.14);transition:transform .15s,box-shadow .2s,background .2s}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 11px 24px -9px color-mix(in oklab,var(--primary) 75%,transparent),inset 0 1px 0 rgba(255,255,255,.14)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:8px 15px;font-size:12px;color:var(--navy);transition:background .18s,border-color .18s,color .18s}
.btn-ghost:hover{background:var(--surface-soft);border-color:color-mix(in oklab,var(--primary) 40%,var(--line))}
.btn-icon{background:none;border:none;padding:5px;border-radius:7px;color:var(--faint);display:inline-flex;align-items:center;transition:background .15s,color .15s,transform .15s}
.btn-icon svg{width:16px;height:16px}
.btn-icon:hover{background:color-mix(in oklab,var(--primary) 9%,transparent);color:var(--primary);transform:scale(1.08)}
.btn-icon.del:hover{background:#FBEAEA;color:#9B3B3B}
.card{background:var(--surface);border:1px solid var(--line);border-radius:15px;transition:transform .2s cubic-bezier(.2,.8,.2,1),box-shadow .2s,border-color .2s}
#content .card:hover{transform:translateY(-2px);box-shadow:0 12px 30px -16px rgba(47,41,68,0.3);border-color:rgba(184,107,139,0.35)}
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 11px;border-radius:99px;white-space:nowrap;letter-spacing:.01em}
.pill-gold{background:#F3E7DF;color:#8A4B2A}
.pill-green{background:#E1EFEB;color:#2C6B5C}
.pill-red{background:#FBEAEA;color:#9B3B3B}
.pill-amber{background:#FAF0DA;color:#8A5A1E}
.pill-blue{background:#E9EEF7;color:#3C5578}
.pill-gray{background:var(--surface-soft);color:var(--muted)}
.metric{background:#fff;border:1px solid var(--line-soft);border-top:2px solid var(--gold);border-radius:0 0 12px 12px;padding:15px 17px;position:relative;overflow:hidden}
.metric::after{content:none}
.tab-btn{display:flex;align-items:center;gap:11px;padding:10px 16px;width:100%;background:none;border:none;border-left:2px solid transparent;font-size:13px;color:var(--muted);font-weight:400;text-align:left;transition:color .15s,background .15s}
.tab-btn .nav-ico{display:inline-flex;color:var(--faint);transition:color .15s,transform .15s}
.tab-btn .nav-ico svg{width:18px;height:18px}
.tab-btn:hover{color:var(--navy);background:rgba(47,41,68,0.04)}
.tab-btn:hover .nav-ico{color:var(--gold);transform:scale(1.1)}
.tab-btn.active{color:var(--navy);font-weight:500;background:white;border-left-color:var(--gold)}
.tab-btn.active .nav-ico{color:var(--gold)}
.field-label{font-size:11.5px;color:var(--muted);display:block;margin-bottom:7px;font-weight:600;letter-spacing:0.01em}
.gold-line{width:28px;height:2px;background:var(--gold);border-radius:2px;margin-bottom:10px;animation:growLine .6s cubic-bezier(.2,.8,.2,1) both}
.overlay{position:fixed;inset:0;background:color-mix(in oklab,var(--navy) 42%,transparent);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding-top:40px;overflow-y:auto;animation:fadeIn .2s ease}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:18px;width:460px;max-width:95vw;padding:1.85rem;margin-bottom:40px;box-shadow:0 24px 60px -20px color-mix(in oklab,var(--navy) 45%,transparent);animation:scaleIn .26s cubic-bezier(.2,.9,.3,1.1) both}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.empty-wrap{text-align:center;padding:3.6rem 1rem 3rem;max-width:430px;margin:0 auto}
.empty-ill{width:142px;margin:0 auto 22px;animation:fadeInUp .6s ease both}
.empty-ill svg{width:100%;height:auto}
.empty-msg{color:var(--navy);font-size:21px;font-weight:600;letter-spacing:-0.01em}
.empty-sub{color:var(--muted);font-size:13.5px;margin-top:9px;line-height:1.55}
.avatar{border-radius:50%;background:linear-gradient(145deg,var(--gold-light),var(--blush));display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--navy);flex-shrink:0;font-family:'Fustat','Inter',sans-serif}
#app{display:flex;min-height:100vh}
#sidebar{width:222px;background:white;border-right:1px solid rgba(47,41,68,0.08);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;height:100dvh;overflow-y:auto;z-index:10;transition:transform 0.25s cubic-bezier(.2,.8,.2,1);padding-bottom:env(safe-area-inset-bottom)}
#main{flex:1;padding:1.85rem;margin-left:222px;min-width:0;position:relative}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%;position:relative;overflow:hidden}
.loading{text-align:center;padding:3rem;color:var(--muted);font-size:13px}
.demo-banner{background:linear-gradient(150deg,var(--gold-light),#fff);border:1px solid rgba(184,107,139,.4);border-radius:11px;padding:10px 15px;margin-bottom:16px;font-size:12px;color:#7a5c1a;display:flex;align-items:center;gap:9px;animation:fadeInUp .4s ease both}
.spinner{width:22px;height:22px;border:2.5px solid rgba(47,41,68,0.13);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;margin-right:9px;vertical-align:middle}
.list-row{animation:fadeInUp .5s cubic-bezier(.16,.84,.44,1) both}
#content .card:nth-child(1),#content .list-row:nth-child(1){animation-delay:.02s}
#content .card:nth-child(2),#content .list-row:nth-child(2){animation-delay:.06s}
#content .card:nth-child(3),#content .list-row:nth-child(3){animation-delay:.10s}
#content .card:nth-child(4),#content .list-row:nth-child(4){animation-delay:.14s}
#content .card:nth-child(5),#content .list-row:nth-child(5){animation-delay:.18s}
#content .card:nth-child(6),#content .list-row:nth-child(6){animation-delay:.22s}
#content .card:nth-child(7),#content .list-row:nth-child(7){animation-delay:.26s}
#content .card:nth-child(8),#content .list-row:nth-child(8){animation-delay:.30s}
#content .card:nth-child(9),#content .list-row:nth-child(9){animation-delay:.34s}
#content .card:nth-child(n+10),#content .list-row:nth-child(n+10){animation-delay:.38s}
.metrics-grid .metric{animation:fadeInUp .5s cubic-bezier(.16,.84,.44,1) both}
.metrics-grid .metric:nth-child(1){animation-delay:.04s}
.metrics-grid .metric:nth-child(2){animation-delay:.10s}
.metrics-grid .metric:nth-child(3){animation-delay:.16s}
.blob{position:absolute;border-radius:50%;filter:blur(2px);opacity:.5;pointer-events:none;z-index:0}
.leaf-sway{transform-origin:bottom center;animation:sway 4s ease-in-out infinite}
.leaf-sway2{transform-origin:bottom center;animation:sway 4.6s ease-in-out infinite reverse}
.sun-rot{transform-origin:center;animation:spinSlow 26s linear infinite}
.float-soft{animation:floatSoft 5s ease-in-out infinite}
.float-soft2{animation:floatSoft 6.5s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinSlow{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes growLine{from{width:0}to{width:28px}}
@keyframes floatSoft{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
@keyframes sway{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.login-card{animation:scaleIn .5s cubic-bezier(.2,.9,.3,1.05) both}
.login-hero{animation:pop .7s cubic-bezier(.2,.9,.3,1.2) both}
#app{display:flex;min-height:100vh}
#sidebar{width:222px;background:white;border-right:1px solid rgba(47,41,68,0.08);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;height:100dvh;overflow-y:auto;z-index:10;transition:transform 0.25s cubic-bezier(.2,.8,.2,1);padding-bottom:env(safe-area-inset-bottom)}
#main{flex:1;padding:1.85rem;margin-left:222px;min-width:0;position:relative}
#bottom-nav{display:none}
@media(max-width:640px){
  #app{display:block}
  /* iOS hace zoom al enfocar un campo con letra < 16px: lo evitamos forzando 16px */
  input,select,textarea{font-size:16px!important}
  #pac-filtro{font-size:16px!important;padding:10px 12px!important}
  .btn-icon{padding:8px}
  .btn-icon svg{width:18px;height:18px}
  #sidebar{transform:translateX(-100%);box-shadow:0 0 40px rgba(0,0,0,.15);width:84vw;max-width:300px}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0;padding:0.9rem;padding-bottom:calc(76px + env(safe-area-inset-bottom))}
  .grid2{grid-template-columns:1fr}
  #bottom-nav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:8;background:var(--surface);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -6px 22px -14px rgba(0,0,0,.35)}
  #bottom-nav button{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 3px 7px;min-height:56px;color:var(--faint);font-family:'Inter',sans-serif;font-size:10.5px;font-weight:500;letter-spacing:.005em;transition:color .15s}
  #bottom-nav button svg{width:22px;height:22px}
  #bottom-nav button.active{color:var(--primary)}
  #bottom-nav button.active .nav-ico{color:var(--primary)}
  #bottom-nav .nav-ico{color:var(--faint);display:inline-flex;transition:color .15s}
  .modal{width:94vw;padding:1.3rem;margin-bottom:24px}
  .overlay{padding-top:18px}
  #tab-title{font-size:19px!important}
  #add-btn{padding:9px 13px!important;font-size:12px!important}
  .btn-label{display:none}
  #export-btn{padding:8px 10px!important}
  .demo-banner{font-size:11px}
  .metrics-grid{grid-template-columns:repeat(2,1fr)!important;gap:9px!important}
  .metric{padding:11px 9px!important}
  .metric::after{display:none}
  .metric .pf{font-size:18px!important}
  #content .card{flex-wrap:wrap;padding:12px 13px!important;gap:11px!important}
  #content .card>div[style*="text-align:right;flex-shrink:0"]{text-align:left!important;flex-basis:100%;order:5;border-top:1px solid rgba(0,0,0,.06);padding-top:9px}
  #content .card>div[style*="display:flex;gap:2px"]{margin-left:auto}
  #content .card[style*="padding:1rem 1.25rem"]{align-items:flex-start!important}
}
#mobile-header{display:none;align-items:center;justify-content:space-between;padding:13px 16px;background:white;border-bottom:1px solid rgba(47,41,68,0.08);position:sticky;top:0;z-index:9}
@keyframes menuSweep{from{opacity:0;transform:translateX(-46px)}to{opacity:1;transform:translateX(0)}}
@media(max-width:640px){
  #sidebar{transition:transform .32s cubic-bezier(.16,.84,.44,1)}
  #sidebar.open #pac-filtro-wrap,
  #sidebar.open #sidebar-nav>*,
  #sidebar.open #sidebar>div:last-child{animation:menuSweep .44s cubic-bezier(.16,.84,.44,1) both}
  #sidebar.open #pac-filtro-wrap{animation-delay:.03s}
  #sidebar.open #sidebar-nav>*:nth-child(1){animation-delay:.07s}
  #sidebar.open #sidebar-nav>*:nth-child(2){animation-delay:.10s}
  #sidebar.open #sidebar-nav>*:nth-child(3){animation-delay:.13s}
  #sidebar.open #sidebar-nav>*:nth-child(4){animation-delay:.16s}
  #sidebar.open #sidebar-nav>*:nth-child(5){animation-delay:.19s}
  #sidebar.open #sidebar-nav>*:nth-child(6){animation-delay:.22s}
  #sidebar.open #sidebar-nav>*:nth-child(7){animation-delay:.25s}
  #sidebar.open #sidebar-nav>*:nth-child(8){animation-delay:.28s}
  #sidebar.open #sidebar-nav>*:nth-child(9){animation-delay:.31s}
  #sidebar.open #sidebar-nav>*:nth-child(10){animation-delay:.34s}
  #sidebar.open #sidebar-nav>*:nth-child(n+11){animation-delay:.37s}
  #sidebar.open #sidebar>div:last-child{animation-delay:.34s}
}
@media(max-width:640px) and (prefers-reduced-motion:reduce){
  #sidebar.open #pac-filtro-wrap,
  #sidebar.open #sidebar-nav>*,
  #sidebar.open #sidebar>div:last-child{animation:none}
}
#overlay-close{display:none;position:fixed;inset:0;z-index:9;background:rgba(0,0,0,0.25)}
.logo-box{background:linear-gradient(150deg,var(--navy),var(--navy2));display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px -8px rgba(47,41,68,0.6)}
.logo-box svg{width:60%;height:60%}
#main{transition:margin-left .25s cubic-bezier(.2,.8,.2,1)}
#nav-toggle{font-size:19px;line-height:1;color:var(--navy);background:none;border:1px solid rgba(47,41,68,.15);border-radius:9px;padding:7px 11px;cursor:pointer;transition:background .15s,border-color .15s,transform .15s;flex-shrink:0}
#nav-toggle:hover{background:var(--cream);border-color:var(--gold);transform:scale(1.05)}
@media(min-width:641px){
  .nav-collapsed #sidebar{transform:translateX(-100%)}
  .nav-collapsed #main{margin-left:0}
}
@media print{
  @page{margin:14mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff!important}
  #sidebar,#mobile-header,#overlay-close,#nav-toggle,#add-btn,#export-btn,#demo-banner,.btn-icon,#modal-overlay,#gline,#tab-title,#tab-sub{display:none!important}
  #app{display:block!important}
  #main{margin-left:0!important;padding:0!important}
  #main>div:first-child{margin-bottom:0!important}
  #print-header{display:block!important;margin-bottom:16px}
  #content .card{box-shadow:none!important;transform:none!important;border:1px solid #e2e2dc!important;break-inside:avoid;page-break-inside:avoid}
  .metric{border:1px solid #e2e2dc!important;break-inside:avoid}
  .empty-wrap{display:none!important}
}
/* ===== Editorial system · "el cuaderno" ===== */
:root{--line:color-mix(in oklab,var(--navy) 13%,transparent);--line-soft:color-mix(in oklab,var(--navy) 6%,transparent)}
.kicker{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:color-mix(in oklab,var(--gold) 55%,var(--navy))}
.standfirst{font-family:'Fustat','Inter',sans-serif;font-style:italic;line-height:1.5}
.rule-gold{height:2px;width:42px;background:var(--gold);border-radius:2px}
.serif-tight{font-family:'Fustat','Inter',sans-serif;line-height:1.04;letter-spacing:-0.018em}
/* animated floating-label fields */
.flt{position:relative;margin-bottom:24px;border-radius:11px 11px 0 0;transition:background .25s ease}
.flt:focus-within{background:var(--line-soft)}
.flt input,.flt select{width:100%;border:none;border-bottom:1.6px solid var(--line);border-radius:0;background:transparent;padding:19px 2px 8px;font-size:15px;color:var(--navy)}
.flt input:focus,.flt select:focus{box-shadow:none;outline:none}
.flt label{position:absolute;left:2px;top:18px;color:var(--muted);font-size:15px;pointer-events:none;transition:transform .24s cubic-bezier(.2,.8,.2,1),color .24s,font-size .24s,letter-spacing .24s;transform-origin:left center}
.flt input:focus~label,.flt input:not(:placeholder-shown)~label,.flt select~label{transform:translateY(-21px);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:color-mix(in oklab,var(--gold) 55%,var(--navy))}
.flt::after{content:"";position:absolute;left:0;bottom:0;height:2px;width:100%;background:var(--gold);transform:scaleX(0);transform-origin:center;transition:transform .3s cubic-bezier(.2,.8,.2,1)}
.flt:focus-within::after{transform:scaleX(1)}
/* single-screen login — claro y cálido, mismo lenguaje que el panel interno */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;width:100%;padding:24px;position:fixed;inset:0;z-index:50;overflow:hidden;background:radial-gradient(130% 80% at 50% -12%,var(--primary-soft),transparent 56%),var(--cream)}
.login-panel{position:relative;z-index:1;width:100%;max-width:380px;text-align:center}
.login-badge{position:relative;margin:0 auto 18px;width:76px;height:76px;border-radius:22px;background:linear-gradient(155deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;box-shadow:0 14px 30px -12px color-mix(in oklab,var(--primary) 55%,transparent)}
.login-badge svg{width:46%;height:46%}
.login-panel .serif-tight{font-family:'Fustat','Inter',sans-serif;letter-spacing:-.03em}
.login-panel .kicker{color:color-mix(in oklab,var(--accent) 70%,var(--navy))}
.login-panel .idx-meta-label{color:var(--muted)}
.login-panel .flt select option{color:var(--navy)}
/* ===== Dropdown propio (reemplaza todos los <select> nativos) ===== */
.cs-native{position:absolute!important;width:1px;height:1px;opacity:0;pointer-events:none;margin:0;padding:0;border:0}
.cs{position:relative}
.cs-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;text-align:left;font-family:'Inter',sans-serif}
.cs-trigger:focus{outline:none}
.cs-chev{flex-shrink:0;transition:transform .22s cubic-bezier(.2,.8,.2,1)}
.cs.open .cs-chev{transform:rotate(180deg);color:var(--gold)}
.cs-menu{list-style:none;position:absolute;top:100%;left:0;right:0;z-index:30;opacity:0;transform:translateY(-6px) scale(.98);transform-origin:top;pointer-events:none;transition:opacity .18s ease,transform .18s cubic-bezier(.2,.8,.2,1);max-height:248px;overflow:auto}
.cs.open .cs-menu{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.cs-opt{cursor:pointer;font-family:'Inter',sans-serif;transition:background .14s,color .14s}
/* — variante flush (login claro, subrayada) — */
.cs--flush .cs-trigger{background:transparent;border:none;border-bottom:1.6px solid var(--line);border-radius:0;padding:19px 2px 8px;font-size:15px;color:var(--navy)}
.cs--flush .cs-chev{width:16px;height:16px;color:var(--muted)}
.cs--flush .cs-menu{margin:8px 0 0;padding:6px;background:var(--surface);border:1px solid var(--line);border-radius:13px;box-shadow:0 18px 40px -16px color-mix(in oklab,var(--navy) 28%,transparent)}
.cs--flush .cs-opt{padding:11px 12px;border-radius:9px;font-size:14px;color:var(--navy)}
.cs--flush .cs-opt:hover,.cs--flush .cs-opt.hi{background:var(--surface-soft);color:var(--navy)}
.cs--flush .cs-opt[aria-selected="true"]{background:var(--primary-soft);color:var(--primary);font-weight:600}
/* — variante dark (sidebar oscuro, boxed) — */
.cs--dark .cs-trigger{background:color-mix(in oklab,var(--cream) 9%,transparent);border:1px solid color-mix(in oklab,var(--cream) 22%,transparent);border-radius:9px;padding:8px 11px;font-size:12px;color:var(--cream)}
.cs--dark.open .cs-trigger{border-color:var(--gold)}
.cs--dark .cs-chev{width:14px;height:14px;color:color-mix(in oklab,var(--cream) 70%,var(--navy))}
.cs--dark .cs-menu{margin:6px 0 0;padding:5px;background:color-mix(in oklab,var(--navy) 92%,#000);border:1px solid color-mix(in oklab,var(--cream) 16%,transparent);border-radius:11px;box-shadow:0 18px 40px -16px rgba(0,0,0,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.cs--dark .cs-opt{padding:8px 10px;border-radius:7px;font-size:12.5px;color:color-mix(in oklab,var(--cream) 86%,var(--navy))}
.cs--dark .cs-opt:hover,.cs--dark .cs-opt.hi{background:color-mix(in oklab,var(--cream) 12%,transparent);color:var(--cream)}
.cs--dark .cs-opt[aria-selected="true"]{background:color-mix(in oklab,var(--gold) 26%,transparent);color:var(--cream);font-weight:500}
/* — variante light (modales, fondo claro) — */
.cs--light .cs-trigger{background:#fff;border:1px solid rgba(47,41,68,0.16);border-radius:9px;padding:10px 13px;font-size:13px;color:var(--navy)}
.cs--light.open .cs-trigger,.cs--light .cs-trigger:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,107,139,0.12)}
.cs--light .cs-chev{width:15px;height:15px;color:var(--muted)}
.cs--light .cs-menu{margin:6px 0 0;padding:5px;background:#fff;border:1px solid rgba(47,41,68,0.12);border-radius:11px;box-shadow:0 18px 40px -16px rgba(20,30,55,0.28)}
.cs--light .cs-opt{padding:9px 11px;border-radius:7px;font-size:13px;color:var(--navy)}
.cs--light .cs-opt:hover,.cs--light .cs-opt.hi{background:var(--cream);color:var(--navy)}
.cs--light .cs-opt[aria-selected="true"]{background:var(--gold-light);color:#7a5c1a;font-weight:500}
.login-badge svg{transform-origin:50% 86%;animation:emblemSway 5.5s ease-in-out infinite}
@keyframes emblemSway{0%,100%{transform:rotate(-3.5deg)}50%{transform:rotate(3.5deg)}}
.login-form{text-align:left;margin-top:6px}
.btn-arrow{display:inline-block;transition:transform .25s cubic-bezier(.2,.8,.2,1)}
.btn-primary:hover .btn-arrow{transform:translateX(4px)}
@media(max-width:640px){.login-panel{padding:62px 22px 26px}}
/* pacientes · index of the casebook */
.idx-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:4px}
.idx-row{display:flex;align-items:center;gap:20px;padding:18px 8px;border-top:1px solid var(--line);transition:background .18s}
.idx-row:last-child{border-bottom:1px solid var(--line)}
.idx-row:hover{background:var(--line-soft)}
.monogram{font-family:'Fustat','Inter',sans-serif;font-weight:600;font-size:19px;color:var(--navy);width:52px;height:52px;border-radius:50%;border:1.5px solid var(--gold);background:linear-gradient(150deg,var(--gold-light),transparent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.idx-meta-label{font-size:11px;color:var(--muted);letter-spacing:.01em;font-weight:600}
.idx-ico svg{width:22px;height:22px}
/* card de paciente rica */
.pac-card{display:flex;align-items:flex-start;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:11px;transition:border-color .18s,box-shadow .22s,transform .2s cubic-bezier(.2,.8,.2,1)}
.pac-card:hover{border-color:color-mix(in oklab,var(--primary) 32%,var(--line));box-shadow:0 12px 28px -18px color-mix(in oklab,var(--navy) 50%,transparent);transform:translateY(-1px)}
.pac-actions{display:flex;align-items:center;gap:7px;flex-shrink:0}
.pill-soft{background:var(--primary-soft);color:var(--primary)}
@media(max-width:640px){
  .pac-card{flex-wrap:wrap;padding:14px 15px}
  .pac-actions{width:100%;justify-content:flex-end;border-top:1px solid var(--line-soft);padding-top:11px;margin-top:5px}
}
@media(max-width:640px){
  .idx-row{flex-wrap:wrap;gap:13px;padding:15px 4px}
  .idx-row .idx-contact{flex-basis:100%;order:5;text-align:left!important;border-top:1px solid var(--line-soft);padding-top:10px}
  .idx-row .idx-actions{margin-left:auto}
}
/* login: la marca entra con un fade escalonado (anime.js) */
.login-anim{opacity:1}
/* ===== Sidebar liviana — panel claro, identidad violeta en los acentos ===== */
#sidebar{background:var(--surface-soft);border-right:1px solid var(--line)}
#sidebar-nav{padding:4px 10px 10px}
.nav-section{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.02em;padding:16px 12px 7px}
.nav-section:first-child{padding-top:6px}
.tab-btn{border-left:none;border-radius:10px;padding:9px 12px;margin-bottom:2px;position:relative;font-size:13.5px}
.tab-btn:hover{color:var(--navy);background:color-mix(in oklab,var(--primary) 8%,transparent)}
.tab-btn:hover .nav-ico{color:var(--primary);transform:none}
.tab-btn.active{color:var(--primary);font-weight:600;background:var(--primary-soft);border-left-color:transparent}
.tab-btn.active .nav-ico{color:var(--primary)}
.tab-btn.active::before{content:'';position:absolute;left:3px;top:50%;transform:translateY(-50%);width:3px;height:16px;border-radius:2px;background:var(--primary)}
#pac-filtro option{color:var(--navy)}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:.001ms!important;animation-iteration-count:1!important;
    transition-duration:.001ms!important;scroll-behavior:auto!important;
  }
  .leaf-sway,.leaf-sway2,.sun-rot,.float-soft,.float-soft2,.blob{animation:none!important}
  .btn-primary:hover,.tab-btn:hover .nav-ico,.btn-icon:hover,#nav-toggle:hover{transform:none!important}
}
</style>
</head>

// Caché en memoria: evita repedir la misma tabla en cada cambio de sección.
let _cache = {};
const CACHE_TTL = 90000; // 90 s; se invalida al escribir
function invalidateCache(){ _cache = {}; }
async function dbGet(table, extra='') {
  if (offlineMode) return (demoStore[table] || []).slice();
  const key = table + extra, now = Date.now(), c = _cache[key];
  if (c && (now - c.ts) < CACHE_TTL) {
    const r = await c.p;
    return Array.isArray(r) ? r.slice() : (demoStore[table] || []).slice();
  }
  const p = sbFetch(table + '?order=created_at.asc' + extra).then(r => {
    if (r !== null) return r;
    offlineMode = true; return (demoStore[table] || []);
  });
  _cache[key] = { p, ts: now };
  const r = await p;
  return Array.isArray(r) ? r.slice() : (demoStore[table] || []).slice();
}
function prefetchAll(){
  if (offlineMode) return;
  ['pacientes','notas','asistencias','conductas','objetivos','informes','gastos','eventos'].forEach(t => { dbGet(t).catch(()=>{}); });
}
async function dbInsert(table, data) {
  if (offlineMode) { const item = { ...data, id: uid(), created_at: Date.now().toString() }; (demoStore[table] = demoStore[table] || []).push(item); return [item]; }
  const r = await sbFetch(table, { method:'POST', body:JSON.stringify(data) });
  invalidateCache(); return r;
}
async function dbUpdate(table, id, data) {
  if (offlineMode) { const arr = demoStore[table] || []; const i = arr.findIndex(x=>x.id===id); if (i>=0) arr[i] = { ...arr[i], ...data }; return [arr[i]]; }
  const r = await sbFetch(table+'?id=eq.'+id, { method:'PATCH', body:JSON.stringify(data) });
  invalidateCache(); return r;
}
async function dbDelete(table, id) {
  if (offlineMode) { demoStore[table] = (demoStore[table] || []).filter(x=>x.id!==id); return []; }
  const r = await sbFetch(table+'?id=eq.'+id, { method:'DELETE' });
  invalidateCache(); return r;
}

// Reemplaza un <select> nativo por un dropdown propio temable.
// Mantiene el <select> en el DOM (oculto) como fuente de la verdad: la lógica
// existente (doLogin, listeners) sigue leyendo y reaccionando a su value.
function enhanceSelect(sel, variant){
  if(!sel || sel._enhanced) return; sel._enhanced = true;
  sel.classList.add('cs-native');
  const cs = document.createElement('div'); cs.className = 'cs cs--' + (variant || 'light');
  const trigger = document.createElement('button');
  trigger.type = 'button'; trigger.className = 'cs-trigger';
  trigger.setAttribute('aria-haspopup','listbox'); trigger.setAttribute('aria-expanded','false');
  const _lbl = sel.parentNode && sel.parentNode.querySelector('label');
  if(_lbl) trigger.setAttribute('aria-label', _lbl.textContent.trim());
  trigger.innerHTML = '<span class="cs-value"></span><svg class="cs-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>';
  const menu = document.createElement('ul'); menu.className = 'cs-menu'; menu.setAttribute('role','listbox');
  const valEl = trigger.querySelector('.cs-value');
  let hi = -1;
  function build(){
    menu.innerHTML = '';
    Array.prototype.forEach.call(sel.options, function(o, i){
      const li = document.createElement('li');
      li.className = 'cs-opt'; li.setAttribute('role','option'); li.dataset.idx = i;
      li.textContent = o.textContent;
      if(o.value === sel.value) li.setAttribute('aria-selected','true');
      li.addEventListener('click', function(){ choose(i); });
      menu.appendChild(li);
    });
    valEl.textContent = sel.selectedIndex >= 0 ? sel.options[sel.selectedIndex].textContent : '';
  }
  function highlight(){ Array.prototype.forEach.call(menu.children, function(li,i){ li.classList.toggle('hi', i===hi); }); }
  function choose(i){
    if(i<0 || i>=sel.options.length) return;
    sel.value = sel.options[i].value; build();
    sel.dispatchEvent(new Event('change', {bubbles:true})); close(); trigger.focus();
  }
  function open(){ cs.classList.add('open'); trigger.setAttribute('aria-expanded','true'); hi = sel.selectedIndex; highlight(); }
  function close(){ cs.classList.remove('open'); trigger.setAttribute('aria-expanded','false'); }
  cs._close = close;
  trigger.addEventListener('click', function(e){ e.stopPropagation(); cs.classList.contains('open') ? close() : open(); });
  trigger.addEventListener('keydown', function(e){
    const isOpen = cs.classList.contains('open');
    if(!isOpen && (e.key==='ArrowDown'||e.key==='ArrowUp'||e.key==='Enter'||e.key===' ')){ e.preventDefault(); open(); return; }
    if(e.key==='Escape'){ close(); }
    else if(e.key==='ArrowDown'){ e.preventDefault(); hi = Math.min(sel.options.length-1, hi+1); highlight(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); hi = Math.max(0, hi-1); highlight(); }
    else if(e.key==='Enter'||e.key===' '){ e.preventDefault(); choose(hi); }
  });
  cs.appendChild(trigger); cs.appendChild(menu);
  sel.insertAdjacentElement('afterend', cs);
  build();
  sel._csBuild = build;
}

function runCounters(){
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  document.querySelectorAll('.count-num').forEach(el=>{
    const target=parseFloat(el.dataset.count)||0;
    const prefix=el.dataset.prefix||'';
    if(reduce){ el.textContent=prefix+Math.round(target).toLocaleString(); return; }
    const dur=650, start=performance.now();
    function step(t){const p=Math.min((t-start)/dur,1);const e=1-Math.pow(1-p,3);el.textContent=prefix+Math.round(target*e).toLocaleString();if(p<1)requestAnimationFrame(step);}
    requestAnimationFrame(step);
  });
}

function barChart(meses, series){
  const slot=56, h=80, padTop=8;
  const W=Math.max(meses.length*slot, slot);
  const H=h+20;
  let max=1; series.forEach(s=>s.values.forEach(v=>{ if(v>max) max=v; }));
  const n=series.length, bw=Math.min(14,(slot-12)/n), groupW=bw*n+(n-1)*3;
  let bars=`<line x1="0" y1="${h}" x2="${W}" y2="${h}" stroke="rgba(47,41,68,.12)" stroke-width="1"/>`;
  meses.forEach((mo,i)=>{
    const x0=i*slot+(slot-groupW)/2;
    series.forEach((s,j)=>{
      const v=s.values[i]||0;
      const bh=v?Math.max((v/max)*(h-padTop),3):0;
      const x=x0+j*(bw+3), y=h-bh;
      if(v){
        bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="2" fill="${s.color}"/>`;
        bars+=`<text x="${(x+bw/2).toFixed(1)}" y="${(y-3).toFixed(1)}" text-anchor="middle" font-size="9" fill="#6a6a60" font-family="Inter,sans-serif">${v}</text>`;
      }
    });
    bars+=`<text x="${(i*slot+slot/2).toFixed(1)}" y="${h+15}" text-anchor="middle" font-size="10" fill="#6a6a60" font-family="Inter,sans-serif">${mo.label}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${Math.max(W,160)}px;height:auto;overflow:visible">${bars}</svg>`;
}

function divergingChart(meses, pos, neg, neu){
  const LP=22, RP=10, TP=15, half=50, BP=25, slot=58;
  const W=LP+meses.length*slot+RP, mid=TP+half, H=TP+2*half+BP;
  let max=1; meses.forEach((m,i)=>{ max=Math.max(max, pos[i]||0, neg[i]||0); });
  let g='';
  [TP, TP+half/2, mid, mid+half/2, mid+half].forEach(y=>{ g+=`<line x1="${LP}" y1="${y}" x2="${W-RP}" y2="${y}" stroke="var(--line-soft)" stroke-width="1"/>`; });
  g+=`<line x1="${LP}" y1="${mid}" x2="${W-RP}" y2="${mid}" stroke="color-mix(in oklab,var(--navy) 24%,transparent)" stroke-width="1.2"/>`;
  g+=`<text x="${LP-5}" y="${TP+3}" text-anchor="end" font-size="9" fill="var(--faint)" font-family="Inter,sans-serif">${max}</text>`;
  g+=`<text x="${LP-5}" y="${mid+3}" text-anchor="end" font-size="9" fill="var(--faint)" font-family="Inter,sans-serif">0</text>`;
  g+=`<text x="${LP-5}" y="${mid+half}" text-anchor="end" font-size="9" fill="var(--faint)" font-family="Inter,sans-serif">${max}</text>`;
  const bw=20;
  meses.forEach((mo,i)=>{
    const cx=LP+i*slot+slot/2, p=pos[i]||0, ng=neg[i]||0, nu=neu[i]||0;
    if(p){ const bh=Math.max(p/max*half,2); g+=`<rect x="${(cx-bw/2).toFixed(1)}" y="${(mid-bh).toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" rx="3" fill="var(--sage)"><title>${mo.label}: ${p} positivas</title></rect><text x="${cx}" y="${(mid-bh-4).toFixed(1)}" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2C6B5C" font-family="Inter,sans-serif">${p}</text>`; }
    if(ng){ const bh=Math.max(ng/max*half,2); g+=`<rect x="${(cx-bw/2).toFixed(1)}" y="${mid}" width="${bw}" height="${bh.toFixed(1)}" rx="3" fill="${CH_RED}"><title>${mo.label}: ${ng} negativas</title></rect><text x="${cx}" y="${(mid+bh+12).toFixed(1)}" text-anchor="middle" font-size="9.5" font-weight="700" fill="#9B3B3B" font-family="Inter,sans-serif">${ng}</text>`; }
    if(nu){ g+=`<circle cx="${cx}" cy="${mid}" r="${Math.min(3+nu,6)}" fill="var(--gold)" stroke="#fff" stroke-width="1.4"><title>${mo.label}: ${nu} neutras</title></circle>`; }
    g+=`<text x="${cx}" y="${H-7}" text-anchor="middle" font-size="10" fill="var(--muted)" font-family="Inter,sans-serif">${mo.label}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${Math.max(W,240)}px;height:auto;overflow:visible">${g}</svg>`;
}
function stacked100Chart(meses, seg){
  const LP=30, RP=10, TP=13, PH=116, BP=24, slot=58;
  const W=LP+meses.length*slot+RP, H=TP+PH+BP;
  let g='';
  [0,25,50,75,100].forEach(p=>{ const y=TP+PH*(1-p/100); g+=`<line x1="${LP}" y1="${y}" x2="${W-RP}" y2="${y}" stroke="var(--line-soft)" stroke-width="1"/><text x="${LP-6}" y="${y+3}" text-anchor="end" font-size="9" fill="var(--faint)" font-family="Inter,sans-serif">${p}%</text>`; });
  const bw=Math.min(26, slot-20);
  meses.forEach((mo,i)=>{
    const cx=LP+i*slot+slot/2, x=cx-bw/2;
    const total=seg.reduce((s,se)=>s+(se.values[i]||0),0);
    if(!total){ g+=`<rect x="${x.toFixed(1)}" y="${TP}" width="${bw}" height="${PH}" rx="4" fill="var(--surface-soft)"/>`; }
    else {
      let acc=0;
      seg.forEach(se=>{ const v=se.values[i]||0; if(!v) return; const segH=v/total*PH, y=TP+PH-acc-segH; acc+=segH; g+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw}" height="${segH.toFixed(1)}" fill="${se.color}"><title>${mo.label} · ${se.label}: ${v} (${Math.round(v/total*100)}%)</title></rect>`; });
      g+=`<text x="${cx}" y="${TP-3}" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2C6B5C" font-family="Inter,sans-serif">${Math.round((seg[0].values[i]||0)/total*100)}%</text>`;
    }
    g+=`<text x="${cx}" y="${H-7}" text-anchor="middle" font-size="10" fill="var(--muted)" font-family="Inter,sans-serif">${mo.label}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${Math.max(W,240)}px;height:auto;overflow:visible">${g}</svg>`;
}

// ---- Gráficos de dona (donut) animados ----
function pctOf(v,total){ return total?Math.round(v*100/total)+'%':'0%'; }
function donutChart(segments, centerBig, centerSub){
  const total=segments.reduce((s,x)=>s+(x.value||0),0);
  const size=168, cx=size/2, cy=size/2, r=62, sw=22, C=2*Math.PI*r;
  const activos=segments.filter(s=>s.value>0);
  let arcs='', ang=-90;
  if(total>0){
    activos.forEach(s=>{
      const frac=s.value/total;
      const gap= activos.length>1 ? 3 : 0;
      const arcLen=Math.max(frac*C-gap, 1);
      const start=ang; ang += frac*360;
      arcs+=`<circle class="donut-seg" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${sw}" stroke-linecap="round" stroke-dasharray="${arcLen.toFixed(2)} ${(C+arcLen).toFixed(2)}" stroke-dashoffset="${arcLen.toFixed(2)}" transform="rotate(${start.toFixed(2)} ${cx} ${cy})" style="transition:stroke-dashoffset .95s cubic-bezier(.2,.8,.2,1)"><title>${s.label}: ${s.value} (${Math.round(frac*100)}%)</title></circle>`;
    });
  } else {
    arcs=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface-soft)" stroke-width="${sw}"/>`;
  }
  return `<svg class="donut" viewBox="0 0 ${size} ${size}" style="width:168px;max-width:100%;height:auto">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--line-soft)" stroke-width="${sw}"/>
    ${arcs}
    <text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="32" font-weight="700" fill="var(--navy)" font-family="Fustat,Inter,sans-serif">${centerBig}</text>
    <text x="${cx}" y="${cy+17}" text-anchor="middle" font-size="10" font-weight="600" fill="var(--muted)" font-family="Inter,sans-serif" letter-spacing="0.06em">${centerSub}</text>
  </svg>`;
}

async function renderPacientes(el) {
  pacientes = await dbGet('pacientes');
  if (detailPac) { return renderPacienteDetalle(el, detailPac); }
  const [notas, asist, objetivos] = await Promise.all([dbGet('notas'), dbGet('asistencias'), dbGet('objetivos')]);
  const now = new Date(), ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const notasMes = notas.filter(n=>n.fecha && n.fecha.slice(0,7)===ym).length;
  const pres = asist.filter(a=>a.estado==='presente').length;
  const asistProm = asist.length ? Math.round(pres*100/asist.length)+'%' : '—';
  const objAct = objetivos.filter(o=>o.estado==='en proceso').length;
  const stats = [
    {l:'En seguimiento', v:pacientes.length, num:true},
    {l:'Notas este mes', v:notasMes, num:true},
    {l:'Asistencia prom.', v:asistProm, num:false},
    {l:'Objetivos activos', v:objAct, num:true}
  ];
  const statsHTML = `<div class="metrics-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(146px,1fr));gap:12px;margin-bottom:22px">
    ${stats.map(s=>`<div class="metric"><p class="idx-meta-label">${s.l}</p>
      <p class="pf ${s.num?'count-num':''}"${s.num?` data-count="${s.v}"`:''} style="font-size:26px;font-weight:600;color:var(--navy);margin-top:3px">${s.num?0:s.v}</p></div>`).join('')}
  </div>`;

  if (!pacientes.length) { el.innerHTML = statsHTML + emptyState('pacientes','Todavía no hay pacientes registrados','Agregá tu primer paciente para empezar el seguimiento.'); runCounters(); return; }

  el.innerHTML = statsHTML + pacientes.map(p=>{
    const ini = p.nombre.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const meta = [p.institucion, p.grado, p.edad?p.edad+' años':''].filter(Boolean).join(' · ');
    const ficha = [p.obra_social, p.frecuencia].filter(Boolean).join(' · ');
    const pN = notas.filter(n=>n.paciente_id===p.id).sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));
    const ult = pN[0];
    const snippet = ult ? `Última nota: ${ult.materia||'—'}${ult.fecha?' · '+ult.fecha:''}` : 'Sin notas cargadas aún';
    const tel = (p.contacto||'').replace(/[^\d+]/g,'');
    const admin = currentRole==='admin';
    return `
    <div class="pac-card list-row">
      <div class="monogram" aria-hidden="true" style="width:50px;height:50px;font-size:18px">${ini}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap">
          <p class="serif-tight" style="font-size:17px;font-weight:600;color:var(--navy)">${p.nombre}</p>
          ${p.diagnostico?`<span class="pill pill-soft">${p.diagnostico}</span>`:''}
        </div>
        ${meta?`<p style="font-size:12.5px;color:var(--muted);margin-top:4px">${meta}</p>`:''}
        ${ficha?`<p style="font-size:12px;color:var(--muted);margin-top:3px">${ficha}</p>`:''}
        <p style="font-size:12.5px;color:var(--muted);margin-top:6px">${snippet}${p.contacto?`<span style="color:var(--line);margin:0 7px">·</span>${p.contacto}`:''}</p>
      </div>
      <div class="pac-actions">
        <button class="btn-ghost" onclick="verSeguimiento('${p.id}')" style="font-size:12px">Ver seguimiento</button>
        ${tel.length>=7?`<a class="btn-ghost" href="tel:${tel}" style="font-size:12px;display:inline-flex;align-items:center" aria-label="Contactar a ${p.nombre}">Contactar</a>`:''}
        ${admin?`<button class="btn-icon" aria-label="Editar" onclick='openEdit("paciente",${JSON.stringify(p)})'>${ICONS_EDIT}</button><button class="btn-icon del" aria-label="Eliminar" onclick="doDelete('pacientes','${p.id}')">${ICONS_DEL}</button>`:''}
      </div>
    </div>`;
  }).join('');
  runCounters();
}

async function renderAsistencias(el, pf) {
  let data = await dbGet('asistencias');
  if (pf) data = data.filter(x=>x.paciente_id===pf);
  const cnt = e => data.filter(a=>a.estado===e).length;
  const pres=cnt('presente'), aus=cnt('ausente'), just=cnt('justificado'), tot=data.length;
  const mesesA=mesesDe(data);
  const presM=contarPorMes(data,mesesA,x=>x.estado==='presente');
  const justM=contarPorMes(data,mesesA,x=>x.estado==='justificado');
  const ausM=contarPorMes(data,mesesA,x=>x.estado==='ausente');
  const totM=mesesA.map((m,i)=>presM[i]+justM[i]+ausM[i]);
  const rateM=mesesA.map((m,i)=>totM[i]?Math.round(presM[i]*100/totM[i]):0);
  const trendA=rateM.length>=2?rateM[rateM.length-1]-rateM[rateM.length-2]:null;
  const presentismo=tot?Math.round(pres*100/tot)+'%':'—';
  const chartA=data.length?donutCard('Presentismo',
    trendChip(trendA,true),
    donutChart([{value:pres,color:'var(--sage)',label:'Presentes'},{value:just,color:CH_AMBER,label:'Justificadas'},{value:aus,color:CH_RED,label:'Ausentes'}], presentismo, 'presentismo'),
    donutLegendRow('var(--sage)','Presentes',pres,pctOf(pres,tot))+donutLegendRow(CH_AMBER,'Justificadas',just,pctOf(just,tot))+donutLegendRow(CH_RED,'Ausentes',aus,pctOf(aus,tot))
  ):'';
  el.innerHTML = `
    ${chartA}
    ${data.length?'<div>'+data.map(a=>`
    <div class="idx-row list-row">
      <div style="width:14px;height:14px;border-radius:50%;background:${a.estado==='presente'?'var(--sage)':a.estado==='ausente'?'#e24b4a':'#ef9f27'};flex-shrink:0;margin:0 4px"></div>
      <div style="flex:1;min-width:0"><p class="serif-tight" style="font-size:17px;font-weight:600;color:var(--navy)">${nomPac(a.paciente_id)}</p><p style="font-size:12.5px;color:var(--muted);margin-top:3px">${[a.fecha,a.ambito,a.horas?a.horas+' h':''].filter(Boolean).join(' · ')}${a.observacion?' — '+a.observacion:''}</p></div>
      <span class="pill ${a.estado==='presente'?'pill-green':a.estado==='ausente'?'pill-red':'pill-amber'}" style="flex-shrink:0">${a.estado}</span>
      ${currentRole==='admin'?`<div class="idx-actions" style="display:flex;gap:2px;flex-shrink:0"><button class="btn-icon" aria-label="Editar" onclick='openEdit("asistencia",${JSON.stringify(a)})'>${ICONS_EDIT}</button><button class="btn-icon del" aria-label="Eliminar" onclick="doDelete('asistencias','${a.id}')">${ICONS_DEL}</button></div>`:''}
    </div>`).join('')+'</div>':emptyState('asistencias','No se registraron asistencias todavía','La asistencia que cargues va a aparecer acá.')}`;
  animateDonut(el);
  runCounters();
}

      <div style="text-align:right;flex-shrink:0"><p class="pf" style="font-size:17px;font-weight:600;color:var(--navy)">$${Number(g.monto).toLocaleString()}</p><span class="pill ${g.tipo==='honorario'?'pill-gold':'pill-blue'}" style="margin-top:3px">${g.tipo||''}</span></div>
      ${currentRole==='admin'?`<div class="idx-actions" style="display:flex;gap:2px;flex-shrink:0"><button class="btn-icon" aria-label="Editar" onclick='openEdit("gasto",${JSON.stringify(g)})'>${ICONS_EDIT}</button><button class="btn-icon del" aria-label="Eliminar" onclick="doDelete('gastos','${g.id}')">${ICONS_DEL}</button></div>`:''}
    </div>`).join('')+'</div>':emptyState('gastos','Todavía no hay gastos cargados','Los honorarios y materiales van a aparecer acá.')}`;
  runCounters();
}

let calYear = new Date().getFullYear(), calMonth = new Date().getMonth(), calEventos = [], calDiaSeleccionado = null;

async function renderCalendario(el, pf) {
  calEventos = await dbGet('eventos');
  if (pf) calEventos = calEventos.filter(x => x.paciente_id === pf || !x.paciente_id);
  renderCalendarioUI(el);
}

function renderCalendarioUI(el) {
  const hoy = new Date();
  const primerDia = new Date(calYear, calMonth, 1).getDay();
  const diasEnMes = new Date(calYear, calMonth + 1, 0).getDate();
  const offset = primerDia === 0 ? 6 : primerDia - 1;
  const eventosPorDia = {};
  calEventos.forEach(ev => {
    if (!ev.fecha) return;
    const [y, m, d] = ev.fecha.split('-');
    if (parseInt(y) === calYear && parseInt(m) - 1 === calMonth) {
      const dia = parseInt(d);
      if (!eventosPorDia[dia]) eventosPorDia[dia] = [];
      eventosPorDia[dia].push(ev);
    }
  });
  const evsDia = calDiaSeleccionado ? (eventosPorDia[calDiaSeleccionado] || []) : [];
  const fechaStr = calDiaSeleccionado ? `${String(calDiaSeleccionado).padStart(2,'0')}/${String(calMonth+1).padStart(2,'0')}/${calYear}` : '';
  let celdas = '';
  for (let i = 0; i < offset; i++) celdas += `<div></div>`;
  for (let d = 1; d <= diasEnMes; d++) {
    const esHoy = d === hoy.getDate() && calMonth === hoy.getMonth() && calYear === hoy.getFullYear();
    const esSel = d === calDiaSeleccionado;
    const evs = eventosPorDia[d] || [];
    const puntos = evs.slice(0,3).map(ev => {
      const color = ev.tipo==='sesion'?'var(--gold)':ev.tipo==='reunion'?'#4a90d9':'var(--sage)';
      return `<div style="width:5px;height:5px;border-radius:50%;background:${color};flex-shrink:0"></div>`;
    }).join('');
    const nEv = evs.length;
    const ariaDia = `${d} de ${MESES[calMonth]}${esHoy?', hoy':''}${nEv?`, ${nEv} evento${nEv>1?'s':''}`:''}`;
    celdas += `
      <button type="button" onclick="selDia(${d})" aria-label="${ariaDia}" aria-pressed="${esSel}" style="font:inherit;width:100%;min-height:44px;cursor:pointer;border-radius:9px;padding:7px 4px;text-align:center;background:${esSel?'var(--navy)':esHoy?'var(--gold-light)':'transparent'};border:${esHoy&&!esSel?'1px solid var(--gold)':'1px solid transparent'};transition:background .15s,transform .12s" onmouseover="if(!${esSel})this.style.background='rgba(47,41,68,.05)'" onmouseout="if(!${esSel})this.style.background='${esHoy?'var(--gold-light)':'transparent'}'">
        <span style="display:block;font-size:13px;font-weight:${esHoy||esSel?'600':'400'};color:${esSel?'white':'var(--navy)'};line-height:1;margin-bottom:4px">${d}</span>
        <span style="display:flex;justify-content:center;gap:2px;min-height:6px" aria-hidden="true">${puntos}</span>
      </button>`;
  }
  el.innerHTML = `
    <div class="card" style="padding:1.35rem;margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <button onclick="cambiarMes(-1)" class="btn-ghost" style="padding:6px 13px;font-size:16px">‹</button>
        <p class="pf" style="font-size:17px;font-weight:500;color:var(--navy)">${MESES[calMonth]} ${calYear}</p>
        <button onclick="cambiarMes(1)" class="btn-ghost" style="padding:6px 13px;font-size:16px">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px">
        ${['Lu','Ma','Mi','Ju','Vi','Sa','Do'].map(d=>`<div style="text-align:center;font-size:11px;font-weight:500;color:var(--muted);padding:4px 0">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${celdas}</div>
    </div>
    ${calDiaSeleccionado ? `
    <div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
      <div><div class="gold-line"></div><p class="pf" style="font-size:15px;color:var(--navy)">${fechaStr}</p></div>
      ${currentRole!=='familia'?`<button class="btn-primary" onclick="openNew()" style="font-size:12px;padding:7px 13px">+ Agregar</button>`:''}
    </div>
    ${evsDia.length ? evsDia.map(ev=>`
    <div class="card" style="padding:11px 14px;display:flex;align-items:center;gap:14px;margin-bottom:9px">
      <div style="width:48px;height:48px;border-radius:11px;background:linear-gradient(150deg,var(--navy),var(--navy2));display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
        <p class="pf" style="font-size:16px;font-weight:500;color:var(--gold);line-height:1">${String(calDiaSeleccionado).padStart(2,'0')}</p>
        <p style="font-size:10px;color:rgba(255,255,255,0.5);font-weight:300">${MESES[calMonth]}</p>
      </div>
      <div style="flex:1">
        <p style="font-weight:500;font-size:14px;color:var(--navy)">${ev.titulo||''}</p>
        <p style="font-size:12px;color:var(--muted);margin-top:2px">🕐 ${ev.hora||''} · ${ev.paciente_id?nomPac(ev.paciente_id):'General'}${ev.lugar?' · '+ev.lugar:''}</p>
        ${ev.nota?`<p style="font-size:12px;color:var(--muted);margin-top:3px;line-height:1.45">${ev.nota}</p>`:''}
      </div>
      <span class="pill ${ev.tipo==='sesion'?'pill-gold':ev.tipo==='reunion'?'pill-blue':'pill-gray'}">${ev.tipo||''}</span>
      ${currentRole==='admin'?`<div style="display:flex;gap:2px"><button class="btn-icon" aria-label="Editar" onclick='openEdit("evento",${JSON.stringify(ev)})'>${ICONS_EDIT}</button><button class="btn-icon del" aria-label="Eliminar" onclick="doDelete('eventos','${ev.id}')">${ICONS_DEL}</button></div>`:''}
    </div>`).join('') : `<div class="empty-wrap" style="padding:1.5rem"><div class="empty-ill" style="width:90px">${illustration('calendario')}</div><p class="empty-msg">Sin eventos este día</p></div>`}
    ` : `<div class="empty-wrap" style="padding:1rem"><p class="empty-msg" style="color:var(--muted)">Hacé clic en un día para ver sus eventos</p></div>`}`;
}

function selDia(d) {
  calDiaSeleccionado = calDiaSeleccionado === d ? null : d;
  renderCalendarioUI(document.getElementById('content'));
}
function cambiarMes(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  calDiaSeleccionado = null;
  renderCalendarioUI(document.getElementById('content'));
}

const ICONS_EDIT = SV+'<path d="M14.5 5.5l4 4M4 20l1-4 11-11 4 4-11 11z"/></svg>';
const ICONS_DEL = SV+'<path d="M5 7h14M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-12"/></svg>';

function fInput(key, placeholder='', type='text', opts=null) {
  const val = editItem ? (editItem[key]??'') : '';
  if (opts) return `<select id="f-${key}">${opts.map(o=>`<option value="${o.v}"${val===o.v?'selected':''}>${o.l}</option>`).join('')}</select>`;
  if (type==='textarea') return `<textarea id="f-${key}" style="height:78px">${val}</textarea>`;
  return `<input type="${type}" id="f-${key}" value="${String(val)}" placeholder="${placeholder}"/>`;
}
function fld(label,inner){const m=inner.match(/id="(f-[^"]+)"/);const f=m?` for="${m[1]}"`:'';return `<div style="margin-bottom:14px"><label class="field-label"${f}>${label}</label>${inner}</div>`;}
function pacOpts(){return [{v:'',l:'Seleccionar'},...pacientes.map(p=>({v:p.id,l:p.nombre}))];}

function openModal(tipo) {
  const isEdit = !!editItem;
  const titles = {nota:isEdit?'Editar nota':'Nueva nota',asistencia:isEdit?'Editar asistencia':'Registrar asistencia',conducta:isEdit?'Editar conducta':'Registrar conducta',objetivo:isEdit?'Editar objetivo':'Nuevo objetivo',informe:isEdit?'Editar informe':'Cargar documento',gasto:isEdit?'Editar gasto':'Agregar gasto',evento:isEdit?'Editar evento':'Nuevo evento',paciente:isEdit?'Editar paciente':'Nuevo paciente'};
  let body='';
  const sel=(...vs)=>[{v:'',l:'—'},...vs.map(x=>({v:x,l:x.charAt(0).toUpperCase()+x.slice(1)}))];
  if(tipo==='paciente'){body=fld('Nombre y apellido',fInput('nombre'))
    +`<div class="grid2">${fld('Fecha de nacimiento',fInput('fecha_nacimiento','','date'))}${fld('Edad',fInput('edad','','number'))}</div>`
    +`<div class="grid2">${fld('DNI',fInput('dni'))}${fld('Diagnóstico',fInput('diagnostico'))}</div>`
    +`<div class="grid2">${fld('Obra social',fInput('obra_social'))}${fld('N° de afiliado',fInput('nro_afiliado'))}</div>`
    +`<div class="grid2">${fld('Institución educativa',fInput('institucion'))}${fld('Grado / Sala',fInput('grado'))}</div>`
    +`<div class="grid2">${fld('Docente / M. integradora',fInput('docente'))}${fld('Profesional derivante',fInput('profesional_derivante'))}</div>`
    +fld('Equipo tratante / otras terapias',fInput('equipo','Ej: fono, psicología, TO'))
    +`<div class="grid2">${fld('Medicación',fInput('medicacion'))}${fld('Frecuencia de AT',fInput('frecuencia','Ej: 3 veces/semana'))}</div>`
    +`<div class="grid2">${fld('Inicio del acompañamiento',fInput('fecha_inicio','','date'))}${fld('Contacto',fInput('contacto'))}</div>`
    +fld('Observaciones generales',fInput('observaciones','','textarea'));}
  else if(tipo==='nota'){body=fld('Paciente',fInput('paciente_id','','text',pacOpts()))+`<div class="grid2">${fld('Fecha',fInput('fecha','','date'))}${fld('Nota (1-10)',fInput('nota','','number'))}</div>`+`<div class="grid2">${fld('Materia',fInput('materia'))}${fld('Período',fInput('periodo','','text',[{v:'',l:'—'},{v:'1er trimestre',l:'1er trimestre'},{v:'2do trimestre',l:'2do trimestre'},{v:'3er trimestre',l:'3er trimestre'},{v:'Anual',l:'Anual'}]))}</div>`+fld('Observaciones',fInput('obs','','textarea'));}
  else if(tipo==='asistencia'){body=fld('Paciente',fInput('paciente_id','','text',pacOpts()))+`<div class="grid2">${fld('Fecha',fInput('fecha','','date'))}${fld('Estado',fInput('estado','','text',[{v:'presente',l:'Presente'},{v:'ausente',l:'Ausente'},{v:'justificado',l:'Justificado'}]))}</div>`+`<div class="grid2">${fld('Ámbito',fInput('ambito','','text',[{v:'',l:'—'},{v:'escuela',l:'Escuela'},{v:'domicilio',l:'Domicilio'},{v:'consultorio',l:'Consultorio'},{v:'virtual',l:'Virtual'}]))}${fld('Horas',fInput('horas','','number'))}</div>`+fld('Observación',fInput('observacion','','textarea'));}
  else if(tipo==='conducta'){body=fld('Paciente',fInput('paciente_id','','text',pacOpts()))+`<div class="grid2">${fld('Fecha',fInput('fecha','','date'))}${fld('Tipo',fInput('tipo','','text',[{v:'positivo',l:'Positivo'},{v:'neutro',l:'Neutro'},{v:'negativo',l:'Negativo'}]))}</div>`+`<div class="grid2">${fld('Ámbito / contexto',fInput('contexto','Ej: aula, recreo'))}${fld('Intensidad',fInput('intensidad','','text',sel('leve','moderada','alta')))}</div>`+fld('Antecedente / disparador',fInput('antecedente','¿Qué pasó justo antes?','textarea'))+fld('Descripción de la conducta',fInput('descripcion','','textarea'))+fld('Intervención / estrategia aplicada',fInput('intervencion','','textarea'));}
  else if(tipo==='objetivo'){const areas=[{v:'Comunicación',l:'Comunicación'},{v:'Lenguaje',l:'Lenguaje'},{v:'Conducta',l:'Conducta'},{v:'Autonomía',l:'Autonomía'},{v:'Social',l:'Social'},{v:'Académico',l:'Académico'},{v:'Emocional',l:'Emocional'},{v:'Otro',l:'Otro'}];body=fld('Paciente',fInput('paciente_id','','text',pacOpts()))+`<div class="grid2">${fld('Área',fInput('area','','text',areas))}${fld('Estado',fInput('estado','','text',[{v:'pendiente',l:'Pendiente'},{v:'en proceso',l:'En proceso'},{v:'logrado',l:'Logrado'}]))}</div>`+`<div class="grid2">${fld('Fecha de inicio',fInput('fecha','','date'))}${fld('Próxima revisión',fInput('fecha_revision','','date'))}</div>`+fld('Objetivo',fInput('objetivo','','textarea'))+fld('Criterio de logro',fInput('criterio','¿Cómo sabremos que se logró?'))+fld('Observaciones',fInput('obs','','textarea'));}
  else if(tipo==='informe'){body=fld('Paciente',fInput('paciente_id','','text',pacOpts()))+`<div class="grid2">${fld('Fecha',fInput('fecha','','date'))}${fld('Categoría',fInput('categoria','','text',[{v:'Evaluación',l:'Evaluación'},{v:'Seguimiento',l:'Seguimiento'},{v:'Informe trimestral',l:'Informe trimestral'},{v:'Comunicación familia',l:'Comunicación familia'},{v:'Otro',l:'Otro'}]))}</div>`+fld('Nombre del documento',fInput('nombre'))+fld('Enlace al documento (URL)',fInput('enlace','https://…','url'))+fld('Autor / profesional',fInput('autor'));}
  else if(tipo==='gasto'){body=fld('Paciente',fInput('paciente_id','','text',pacOpts()))+`<div class="grid2">${fld('Fecha',fInput('fecha','','date'))}${fld('Monto ($)',fInput('monto','','number'))}</div>`+fld('Concepto',fInput('concepto'))+`<div class="grid2">${fld('Tipo',fInput('tipo','','text',[{v:'honorario',l:'Honorario'},{v:'material',l:'Material'},{v:'otro',l:'Otro'}]))}${fld('Estado de pago',fInput('estado_pago','','text',[{v:'pendiente',l:'Pendiente'},{v:'pagado',l:'Pagado'}]))}</div>`+fld('Medio de pago',fInput('medio','','text',[{v:'',l:'—'},{v:'Efectivo',l:'Efectivo'},{v:'Transferencia',l:'Transferencia'},{v:'Obra social',l:'Obra social'},{v:'Otro',l:'Otro'}]));}
  else if(tipo==='evento'){const pe=[{v:'',l:'General'},...pacientes.map(p=>({v:p.id,l:p.nombre}))];body=fld('Paciente (opcional)',fInput('paciente_id','','text',pe))+`<div class="grid2">${fld('Fecha',fInput('fecha','','date'))}${fld('Hora',fInput('hora','','time'))}</div>`+`<div class="grid2">${fld('Título',fInput('titulo'))}${fld('Tipo',fInput('tipo','','text',[{v:'sesion',l:'Sesión'},{v:'reunion',l:'Reunión'},{v:'otro',l:'Otro'}]))}</div>`+fld('Lugar / modalidad',fInput('lugar'))+fld('Nota',fInput('nota','','textarea'));}
  document.getElementById('modal-box').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <p class="pf" style="font-size:17px;font-weight:500;color:var(--navy)">${titles[tipo]}</p>
      <button onclick="closeModal()" aria-label="Cerrar" style="background:none;border:none;font-size:23px;color:var(--muted);cursor:pointer;line-height:1">×</button>
    </div>${body}
    <button class="btn-primary" onclick="saveModal('${tipo}')" style="width:100%;justify-content:center;padding:12px;margin-top:4px">Guardar</button>`;
  document.getElementById('modal-overlay').style.display='flex';
  document.querySelectorAll('#modal-box select').forEach(s=>enhanceSelect(s, 'light'));
}

async function saveModal(tipo) {
  const gv = id => { const el=document.getElementById('f-'+id); return el?el.value:''; };
  const tableMap={paciente:'pacientes',nota:'notas',asistencia:'asistencias',conducta:'conductas',objetivo:'objetivos',informe:'informes',gasto:'gastos',evento:'eventos'};
  const table=tableMap[tipo];
  let data={};
  if(tipo==='paciente') data={nombre:gv('nombre'),edad:gv('edad')||null,fecha_nacimiento:gv('fecha_nacimiento')||null,dni:gv('dni'),diagnostico:gv('diagnostico'),obra_social:gv('obra_social'),nro_afiliado:gv('nro_afiliado'),institucion:gv('institucion'),grado:gv('grado'),docente:gv('docente'),profesional_derivante:gv('profesional_derivante'),equipo:gv('equipo'),medicacion:gv('medicacion'),frecuencia:gv('frecuencia'),fecha_inicio:gv('fecha_inicio')||null,contacto:gv('contacto'),observaciones:gv('observaciones')};
  else if(tipo==='nota') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,materia:gv('materia'),nota:parseInt(gv('nota'))||null,periodo:gv('periodo'),obs:gv('obs')};
  else if(tipo==='asistencia') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,estado:gv('estado'),ambito:gv('ambito'),horas:parseFloat(gv('horas'))||null,observacion:gv('observacion')};
  else if(tipo==='conducta') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,tipo:gv('tipo'),contexto:gv('contexto'),intensidad:gv('intensidad'),antecedente:gv('antecedente'),descripcion:gv('descripcion'),intervencion:gv('intervencion')};
  else if(tipo==='objetivo') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,fecha_revision:gv('fecha_revision')||null,area:gv('area'),estado:gv('estado'),objetivo:gv('objetivo'),criterio:gv('criterio'),obs:gv('obs')};
  else if(tipo==='informe') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,categoria:gv('categoria'),nombre:gv('nombre'),enlace:gv('enlace'),autor:gv('autor')};
  else if(tipo==='gasto') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,concepto:gv('concepto'),monto:parseFloat(gv('monto'))||0,tipo:gv('tipo'),estado_pago:gv('estado_pago'),medio:gv('medio')};
  else if(tipo==='evento') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,hora:gv('hora'),titulo:gv('titulo'),tipo:gv('tipo'),lugar:gv('lugar'),nota:gv('nota')};
  if(editItem) await dbUpdate(table,editItem.id,data);
  else await dbInsert(table,data);
  if(tipo==='paciente') pacientes=await dbGet('pacientes');
  closeModal();
  renderTab();
}

function closeModal(){document.getElementById('modal-overlay').style.display='none';editItem=null;}
function handleOverlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
</script>
