<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plataforma Educativa · A.T. Priscila Ibazeta</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--navy);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .35s ease,color .35s ease}
.pf{font-family:'Playfair Display',Georgia,serif}
:root{
  --navy:#1e3a5f;--navy2:#2c4a7c;--gold:#c9a84c;--gold-light:#f5edda;--cream:#faf8f4;
  --sage:#7a9b76;--sage-light:#e6efe2;--warm:#e3b58c;--blush:#f3e3da;
}
body[data-theme="salvia"]{
  --navy:#2f5944;--navy2:#3d6b54;--gold:#cf9a5e;--gold-light:#f3e6d3;--cream:#f7f5ef;
  --sage:#6f9b6a;--sage-light:#e4efe0;--warm:#e0a878;--blush:#f1e2d4;
}
body[data-theme="lavanda"]{
  --navy:#4a3f78;--navy2:#5b4b8a;--gold:#b06a8f;--gold-light:#efe2ec;--cream:#f8f6fb;
  --sage:#8a86b0;--sage-light:#e8e6f2;--warm:#d6a0b8;--blush:#f1e4ee;
}
body[data-theme="oceano"]{
  --navy:#14515a;--navy2:#1d6a73;--gold:#e0805f;--gold-light:#fbe4da;--cream:#f3f8f7;
  --sage:#5fa39a;--sage-light:#def0ec;--warm:#e8a07f;--blush:#fbe0d6;
}
.theme-dots{display:flex;gap:9px;align-items:center}
.theme-dot{width:22px;height:22px;border-radius:50%;border:2px solid #fff;cursor:pointer;padding:0;transition:transform .15s,box-shadow .15s;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.theme-dot:hover{transform:scale(1.18)}
.theme-dot.active{box-shadow:0 0 0 2px var(--navy)}
input,select,textarea{font-family:'Inter',sans-serif;font-size:13px;color:var(--navy);border:1px solid rgba(30,58,95,0.16);border-radius:9px;padding:10px 13px;width:100%;outline:none;background:white;transition:border-color .18s,box-shadow .18s}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.12)}
textarea{resize:vertical}
button{font-family:'Inter',sans-serif;cursor:pointer}
.btn-primary{background:var(--navy);color:white;border:none;border-radius:9px;padding:10px 17px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;transition:transform .15s,box-shadow .2s,background .2s}
.btn-primary:hover{background:var(--navy2);transform:translateY(-1px);box-shadow:0 6px 16px -6px rgba(30,58,95,0.5)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{background:none;border:1px solid rgba(30,58,95,0.18);border-radius:9px;padding:8px 15px;font-size:12px;color:var(--navy);transition:background .18s,border-color .18s}
.btn-ghost:hover{background:var(--cream);border-color:var(--gold)}
.btn-icon{background:none;border:none;padding:5px;border-radius:7px;color:#b9bbc2;display:inline-flex;align-items:center;transition:background .15s,color .15s,transform .15s}
.btn-icon svg{width:16px;height:16px}
.btn-icon:hover{background:rgba(30,58,95,0.07);color:var(--navy);transform:scale(1.08)}
.btn-icon.del:hover{background:#fceaea;color:#9b2c2c}
.card{background:white;border:1px solid rgba(30,58,95,0.09);border-radius:14px;transition:transform .2s cubic-bezier(.2,.8,.2,1),box-shadow .2s,border-color .2s}
#content .card:hover{transform:translateY(-2px);box-shadow:0 12px 30px -16px rgba(30,58,95,0.3);border-color:rgba(201,168,76,0.35)}
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 11px;border-radius:99px;white-space:nowrap}
.pill-gold{background:var(--gold-light);color:#7a5c1a}
.pill-green{background:var(--sage-light);color:#3d6b33}
.pill-red{background:#fceaea;color:#7a1f1f}
.pill-amber{background:#fef3d8;color:#7a4d0a}
.pill-blue{background:#e6eff8;color:#1a3f6f}
.pill-gray{background:#f2f0eb;color:#4a4a40}
.metric{background:linear-gradient(150deg,var(--cream),#fff);border:1px solid rgba(30,58,95,0.06);border-radius:13px;padding:15px 17px;position:relative;overflow:hidden}
.metric::after{content:'';position:absolute;right:-14px;top:-14px;width:50px;height:50px;border-radius:50%;background:var(--gold-light);opacity:.5}
.tab-btn{display:flex;align-items:center;gap:11px;padding:10px 16px;width:100%;background:none;border:none;border-left:2px solid transparent;font-size:13px;color:#8a8a80;font-weight:400;text-align:left;transition:color .15s,background .15s}
.tab-btn .nav-ico{display:inline-flex;color:#aab;transition:color .15s,transform .15s}
.tab-btn .nav-ico svg{width:18px;height:18px}
.tab-btn:hover{color:var(--navy);background:rgba(30,58,95,0.04)}
.tab-btn:hover .nav-ico{color:var(--gold);transform:scale(1.1)}
.tab-btn.active{color:var(--navy);font-weight:500;background:white;border-left-color:var(--gold)}
.tab-btn.active .nav-ico{color:var(--gold)}
.field-label{font-size:11px;color:#8a8a80;display:block;margin-bottom:6px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase}
.gold-line{width:28px;height:2px;background:var(--gold);border-radius:2px;margin-bottom:10px;animation:growLine .6s cubic-bezier(.2,.8,.2,1) both}
.overlay{position:fixed;inset:0;background:rgba(10,20,40,0.4);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding-top:40px;overflow-y:auto;animation:fadeIn .2s ease}
.modal{background:white;border:1px solid rgba(30,58,95,0.1);border-radius:16px;width:460px;max-width:95vw;padding:1.85rem;margin-bottom:40px;box-shadow:0 24px 60px -20px rgba(10,20,40,0.4);animation:scaleIn .26s cubic-bezier(.2,.9,.3,1.1) both}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.empty-wrap{text-align:center;padding:2.5rem 1rem}
.empty-ill{width:130px;margin:0 auto 14px;animation:fadeInUp .6s ease both}
.empty-ill svg{width:100%;height:auto}
.empty-msg{color:var(--navy);font-size:14px;font-weight:500}
.empty-sub{color:#aaa;font-size:12px;margin-top:4px}
.avatar{border-radius:50%;background:linear-gradient(145deg,var(--gold-light),var(--blush));display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--navy);flex-shrink:0;font-family:'Playfair Display',serif}
#app{display:flex;min-height:100vh}
#sidebar{width:222px;background:white;border-right:1px solid rgba(30,58,95,0.08);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:10;transition:transform 0.25s cubic-bezier(.2,.8,.2,1)}
#main{flex:1;padding:1.85rem;margin-left:222px;min-width:0;position:relative}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%;position:relative;overflow:hidden}
.loading{text-align:center;padding:3rem;color:#aaa;font-size:13px}
.demo-banner{background:linear-gradient(150deg,var(--gold-light),#fff);border:1px solid rgba(201,168,76,.4);border-radius:11px;padding:10px 15px;margin-bottom:16px;font-size:12px;color:#7a5c1a;display:flex;align-items:center;gap:9px;animation:fadeInUp .4s ease both}
.spinner{width:22px;height:22px;border:2.5px solid rgba(30,58,95,0.13);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;margin-right:9px;vertical-align:middle}
.list-row{animation:fadeInUp .5s cubic-bezier(.16,.84,.44,1) both}
#content .card:nth-child(1),#content .list-row:nth-child(1){animation-delay:.02s}
#content .card:nth-child(2),#content .list-row:nth-child(2){animation-delay:.06s}
#content .card:nth-child(3),#content .list-row:nth-child(3){animation-delay:.10s}
#content .card:nth-child(4),#content .list-row:nth-child(4){animation-delay:.14s}
#content .card:nth-child(5),#content .list-row:nth-child(5){animation-delay:.18s}
#content .card:nth-child(6),#content .list-row:nth-child(6){animation-delay:.22s}
#content .card:nth-child(7),#content .list-row:nth-child(7){animation-delay:.26s}
#content .card:nth-child(8),#content .list-row:nth-child(8){animation-delay:.30s}
#content .card:nth-child(9),#content .list-row:nth-child(9){animation-delay:.34s}
#content .card:nth-child(n+10),#content .list-row:nth-child(n+10){animation-delay:.38s}
.metrics-grid .metric{animation:fadeInUp .5s cubic-bezier(.16,.84,.44,1) both}
.metrics-grid .metric:nth-child(1){animation-delay:.04s}
.metrics-grid .metric:nth-child(2){animation-delay:.10s}
.metrics-grid .metric:nth-child(3){animation-delay:.16s}
.blob{position:absolute;border-radius:50%;filter:blur(2px);opacity:.5;pointer-events:none;z-index:0}
.leaf-sway{transform-origin:bottom center;animation:sway 4s ease-in-out infinite}
.leaf-sway2{transform-origin:bottom center;animation:sway 4.6s ease-in-out infinite reverse}
.sun-rot{transform-origin:center;animation:spinSlow 26s linear infinite}
.float-soft{animation:floatSoft 5s ease-in-out infinite}
.float-soft2{animation:floatSoft 6.5s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinSlow{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes growLine{from{width:0}to{width:28px}}
@keyframes floatSoft{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
@keyframes sway{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes pop{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.login-card{animation:scaleIn .5s cubic-bezier(.2,.9,.3,1.05) both}
.login-hero{animation:pop .7s cubic-bezier(.2,.9,.3,1.2) both}
@media(max-width:640px){
  #app{display:block}
  #sidebar{transform:translateX(-100%);box-shadow:0 0 40px rgba(0,0,0,.15);width:84vw;max-width:300px}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0;padding:0.9rem}
  #mobile-header{display:flex}
  .grid2{grid-template-columns:1fr}
  .modal{width:94vw;padding:1.3rem;margin-bottom:24px}
  .overlay{padding-top:18px}
  #tab-title{font-size:19px!important}
  #add-btn{padding:9px 13px!important;font-size:12px!important}
  .demo-banner{font-size:11px}
  .metrics-grid{grid-template-columns:repeat(3,1fr)!important;gap:8px!important}
  .metric{padding:11px 9px!important}
  .metric::after{display:none}
  .metric .pf{font-size:18px!important}
  #content .card{flex-wrap:wrap;padding:12px 13px!important;gap:11px!important}
  #content .card>div[style*="text-align:right;flex-shrink:0"]{text-align:left!important;flex-basis:100%;order:5;border-top:1px solid rgba(0,0,0,.06);padding-top:9px}
  #content .card>div[style*="display:flex;gap:2px"]{margin-left:auto}
  #content .card[style*="padding:1rem 1.25rem"]{align-items:flex-start!important}
}
#mobile-header{display:none;align-items:center;justify-content:space-between;padding:13px 16px;background:white;border-bottom:1px solid rgba(30,58,95,0.08);position:sticky;top:0;z-index:9}
#overlay-close{display:none;position:fixed;inset:0;z-index:9;background:rgba(0,0,0,0.25)}
.logo-box{background:linear-gradient(150deg,var(--navy),var(--navy2));display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px -8px rgba(30,58,95,0.6)}
.logo-box svg{width:60%;height:60%}
#main{transition:margin-left .25s cubic-bezier(.2,.8,.2,1)}
#nav-toggle{font-size:19px;line-height:1;color:var(--navy);background:none;border:1px solid rgba(30,58,95,.15);border-radius:9px;padding:7px 11px;cursor:pointer;transition:background .15s,border-color .15s,transform .15s;flex-shrink:0}
#nav-toggle:hover{background:var(--cream);border-color:var(--gold);transform:scale(1.05)}
@media(min-width:641px){
  .nav-collapsed #sidebar{transform:translateX(-100%)}
  .nav-collapsed #main{margin-left:0}
}
@media(max-width:640px){#nav-toggle{display:none}}
</style>
</head>

async function sbFetch(path, opts = {}) {
  try {
    const res = await fetch(SB_URL + '/rest/v1/' + path, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...opts.headers },
      ...opts
    });
    if (!res.ok) { console.error('Supabase', res.status, await res.text()); return null; }
    const txt = await res.text();
    return txt ? JSON.parse(txt) : [];
  } catch (err) {
    console.error('Error de red Supabase (probablemente bloqueado por el sandbox de la preview):', err);
    return null;
  }
}

async function dbGet(table, extra='') {
  if (!offlineMode) { const r = await sbFetch(table+'?order=created_at.asc'+extra); if (r !== null) return r; offlineMode = true; }
  return (demoStore[table] || []).slice();
}
async function dbInsert(table, data) {
  if (offlineMode) { const item = { ...data, id: uid(), created_at: Date.now().toString() }; (demoStore[table] = demoStore[table] || []).push(item); return [item]; }
  return await sbFetch(table, { method:'POST', body:JSON.stringify(data) });
}
async function dbUpdate(table, id, data) {
  if (offlineMode) { const arr = demoStore[table] || []; const i = arr.findIndex(x=>x.id===id); if (i>=0) arr[i] = { ...arr[i], ...data }; return [arr[i]]; }
  return await sbFetch(table+'?id=eq.'+id, { method:'PATCH', body:JSON.stringify(data) });
}
async function dbDelete(table, id) {
  if (offlineMode) { demoStore[table] = (demoStore[table] || []).filter(x=>x.id!==id); return []; }
  return await sbFetch(table+'?id=eq.'+id, { method:'DELETE' });
}

function runCounters(){
  document.querySelectorAll('.count-num').forEach(el=>{
    const target=parseFloat(el.dataset.count)||0;
    const prefix=el.dataset.prefix||'';
    const dur=650, start=performance.now();
    function step(t){const p=Math.min((t-start)/dur,1);const e=1-Math.pow(1-p,3);el.textContent=prefix+Math.round(target*e).toLocaleString();if(p<1)requestAnimationFrame(step);}
    requestAnimationFrame(step);
  });
}

  el.innerHTML = `
    <div class="metrics-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px">
      ${[['Presentes',pres],['Ausentes',aus],['Justificados',just]].map(([l,v])=>`
        <div class="metric"><p style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;font-weight:500;margin-bottom:4px">${l}</p>
        <p class="pf count-num" data-count="${v}" style="font-size:25px;font-weight:500;color:var(--navy)">0</p>
        ${tot?`<p style="font-size:11px;color:#bbb;margin-top:2px">${Math.round(v*100/tot)}%</p>`:''}</div>`).join('')}
    </div>
    ${data.length?data.map(a=>`
    <div class="card" style="padding:11px 16px;display:flex;align-items:center;gap:12px;margin-bottom:9px">
      <div style="width:8px;height:8px;border-radius:50%;background:${a.estado==='presente'?'var(--sage)':a.estado==='ausente'?'#e24b4a':'#ef9f27'};flex-shrink:0"></div>
      <div style="flex:1"><p style="font-weight:500;font-size:14px;color:var(--navy)">${nomPac(a.paciente_id)}</p><p style="font-size:12px;color:#999;margin-top:1px">${a.fecha||''}</p></div>
      <span class="pill ${a.estado==='presente'?'pill-green':a.estado==='ausente'?'pill-red':'pill-amber'}">${a.estado}</span>
      ${currentRole==='admin'?`<div style="display:flex;gap:2px"><button class="btn-icon" onclick='openEdit("asistencia",${JSON.stringify(a)})'>${ICONS_EDIT}</button><button class="btn-icon del" onclick="doDelete('asistencias','${a.id}')">${ICONS_DEL}</button></div>`:''}
    </div>`).join(''):emptyState('asistencias','Sin asistencias registradas')}`;
  runCounters();
}

async function renderConductas(el, pf) {
  let data = await dbGet('conductas');
  if (pf) data = data.filter(x=>x.paciente_id===pf);
  if (!data.length) { el.innerHTML=emptyState('conductas','Sin conductas registradas'); return; }
  el.innerHTML = data.map(c=>`
    <div class="card" style="padding:13px 16px;margin-bottom:9px;border-left:3px solid ${c.tipo==='positivo'?'var(--sage)':c.tipo==='negativo'?'#e24b4a':'var(--gold)'}">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;align-items:flex-start">
        <div><p style="font-weight:500;font-size:14px;color:var(--navy)">${nomPac(c.paciente_id)}</p><p style="font-size:11px;color:#bbb;margin-top:1px">${c.fecha||''}</p></div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="pill ${c.tipo==='positivo'?'pill-green':c.tipo==='negativo'?'pill-red':'pill-amber'}">${c.tipo||''}</span>
          ${currentRole==='admin'?`<div style="display:flex;gap:2px"><button class="btn-icon" onclick='openEdit("conducta",${JSON.stringify(c)})'>${ICONS_EDIT}</button><button class="btn-icon del" onclick="doDelete('conductas','${c.id}')">${ICONS_DEL}</button></div>`:''}
        </div>
      </div>
      <p style="font-size:13px;color:#666;line-height:1.55">${c.descripcion||''}</p>
    </div>`).join('');
}

async function renderInformes(el, pf) {
  let data = await dbGet('informes');
  if (pf) data = data.filter(x=>x.paciente_id===pf);
  if (!data.length) { el.innerHTML=emptyState('informes','Sin documentos cargados'); return; }
  el.innerHTML = data.map(inf=>`
    <div class="card" style="padding:11px 14px;display:flex;align-items:center;gap:12px;margin-bottom:9px">
      <div style="width:42px;height:42px;border-radius:11px;background:var(--gold-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--gold)">${ICONS.informes}</div>
      <div style="flex:1;min-width:0">
        <p style="font-weight:500;font-size:13px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${inf.nombre||''}</p>
        <p style="font-size:12px;color:#999;margin-top:2px">${nomPac(inf.paciente_id)} · ${inf.fecha||''}</p>
      </div>
      <span class="pill pill-blue">${inf.categoria||''}</span>
      ${currentRole==='admin'?`<div style="display:flex;gap:2px"><button class="btn-icon" onclick='openEdit("informe",${JSON.stringify(inf)})'>${ICONS_EDIT}</button><button class="btn-icon del" onclick="doDelete('informes','${inf.id}')">${ICONS_DEL}</button></div>`:''}
    </div>`).join('');
}

async function renderGastos(el, pf) {
  let data = await dbGet('gastos');
  if (pf) data = data.filter(x=>x.paciente_id===pf);
  const total=data.reduce((s,g)=>s+Number(g.monto),0);
  const hon=data.filter(g=>g.tipo==='honorario').reduce((s,g)=>s+Number(g.monto),0);
  const mat=data.filter(g=>g.tipo==='material').reduce((s,g)=>s+Number(g.monto),0);
  el.innerHTML = `
    <div class="metrics-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px">
      ${[['Total',total],['Honorarios',hon],['Materiales',mat]].map(([l,v])=>`
        <div class="metric"><p style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:0.05em;font-weight:500;margin-bottom:4px">${l}</p>
        <p class="pf count-num" data-count="${v}" data-prefix="$" style="font-size:23px;font-weight:500;color:var(--navy)">$0</p></div>`).join('')}
    </div>
    ${data.length?data.map(g=>`
    <div class="card" style="padding:11px 16px;display:flex;align-items:center;gap:12px;margin-bottom:9px">
      <div style="flex:1"><p style="font-weight:500;font-size:14px;color:var(--navy)">${g.concepto||''}</p><p style="font-size:12px;color:#999;margin-top:2px">${nomPac(g.paciente_id)} · ${g.fecha||''}</p></div>
      <div style="text-align:right"><p class="pf" style="font-size:16px;font-weight:500;color:var(--navy)">$${Number(g.monto).toLocaleString()}</p><span class="pill ${g.tipo==='honorario'?'pill-gold':'pill-blue'}">${g.tipo||''}</span></div>
      ${currentRole==='admin'?`<div style="display:flex;gap:2px"><button class="btn-icon" onclick='openEdit("gasto",${JSON.stringify(g)})'>${ICONS_EDIT}</button><button class="btn-icon del" onclick="doDelete('gastos','${g.id}')">${ICONS_DEL}</button></div>`:''}
    </div>`).join(''):emptyState('gastos','Sin gastos registrados')}`;
  runCounters();
}

let calYear = new Date().getFullYear(), calMonth = new Date().getMonth(), calEventos = [], calDiaSeleccionado = null;

async function renderCalendario(el, pf) {
  calEventos = await dbGet('eventos');
  if (pf) calEventos = calEventos.filter(x => x.paciente_id === pf || !x.paciente_id);
  renderCalendarioUI(el);
}

function renderCalendarioUI(el) {
  const hoy = new Date();
  const primerDia = new Date(calYear, calMonth, 1).getDay();
  const diasEnMes = new Date(calYear, calMonth + 1, 0).getDate();
  const offset = primerDia === 0 ? 6 : primerDia - 1;
  const eventosPorDia = {};
  calEventos.forEach(ev => {
    if (!ev.fecha) return;
    const [y, m, d] = ev.fecha.split('-');
    if (parseInt(y) === calYear && parseInt(m) - 1 === calMonth) {
      const dia = parseInt(d);
      if (!eventosPorDia[dia]) eventosPorDia[dia] = [];
      eventosPorDia[dia].push(ev);
    }
  });
  const evsDia = calDiaSeleccionado ? (eventosPorDia[calDiaSeleccionado] || []) : [];
  const fechaStr = calDiaSeleccionado ? `${String(calDiaSeleccionado).padStart(2,'0')}/${String(calMonth+1).padStart(2,'0')}/${calYear}` : '';
  let celdas = '';
  for (let i = 0; i < offset; i++) celdas += `<div></div>`;
  for (let d = 1; d <= diasEnMes; d++) {
    const esHoy = d === hoy.getDate() && calMonth === hoy.getMonth() && calYear === hoy.getFullYear();
    const esSel = d === calDiaSeleccionado;
    const evs = eventosPorDia[d] || [];
    const puntos = evs.slice(0,3).map(ev => {
      const color = ev.tipo==='sesion'?'var(--gold)':ev.tipo==='reunion'?'#4a90d9':'var(--sage)';
      return `<div style="width:5px;height:5px;border-radius:50%;background:${color};flex-shrink:0"></div>`;
    }).join('');
    celdas += `
      <div onclick="selDia(${d})" style="cursor:pointer;border-radius:9px;padding:7px 4px;text-align:center;background:${esSel?'var(--navy)':esHoy?'var(--gold-light)':'transparent'};border:${esHoy&&!esSel?'1px solid var(--gold)':'1px solid transparent'};transition:background .15s,transform .12s" onmouseover="if(!${esSel})this.style.background='rgba(30,58,95,.05)'" onmouseout="if(!${esSel})this.style.background='${esHoy?'var(--gold-light)':'transparent'}'">
        <p style="font-size:13px;font-weight:${esHoy||esSel?'600':'400'};color:${esSel?'white':'var(--navy)'};line-height:1;margin-bottom:4px">${d}</p>
        <div style="display:flex;justify-content:center;gap:2px;min-height:6px">${puntos}</div>
      </div>`;
  }
  el.innerHTML = `
    <div class="card" style="padding:1.35rem;margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <button onclick="cambiarMes(-1)" class="btn-ghost" style="padding:6px 13px;font-size:16px">‹</button>
        <p class="pf" style="font-size:17px;font-weight:500;color:var(--navy)">${MESES[calMonth]} ${calYear}</p>
        <button onclick="cambiarMes(1)" class="btn-ghost" style="padding:6px 13px;font-size:16px">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px">
        ${['Lu','Ma','Mi','Ju','Vi','Sa','Do'].map(d=>`<div style="text-align:center;font-size:11px;font-weight:500;color:#aaa;padding:4px 0">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${celdas}</div>
    </div>
    ${calDiaSeleccionado ? `
    <div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
      <div><div class="gold-line"></div><p class="pf" style="font-size:15px;color:var(--navy)">${fechaStr}</p></div>
      ${currentRole!=='familia'?`<button class="btn-primary" onclick="openNew()" style="font-size:12px;padding:7px 13px">+ Agregar</button>`:''}
    </div>
    ${evsDia.length ? evsDia.map(ev=>`
    <div class="card" style="padding:11px 14px;display:flex;align-items:center;gap:14px;margin-bottom:9px">
      <div style="width:48px;height:48px;border-radius:11px;background:linear-gradient(150deg,var(--navy),var(--navy2));display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
        <p class="pf" style="font-size:16px;font-weight:500;color:var(--gold);line-height:1">${String(calDiaSeleccionado).padStart(2,'0')}</p>
        <p style="font-size:10px;color:rgba(255,255,255,0.5);font-weight:300">${MESES[calMonth]}</p>
      </div>
      <div style="flex:1">
        <p style="font-weight:500;font-size:14px;color:var(--navy)">${ev.titulo||''}</p>
        <p style="font-size:12px;color:#999;margin-top:2px">🕐 ${ev.hora||''} · ${ev.paciente_id?nomPac(ev.paciente_id):'General'}</p>
      </div>
      <span class="pill ${ev.tipo==='sesion'?'pill-gold':ev.tipo==='reunion'?'pill-blue':'pill-gray'}">${ev.tipo||''}</span>
      ${currentRole==='admin'?`<div style="display:flex;gap:2px"><button class="btn-icon" onclick='openEdit("evento",${JSON.stringify(ev)})'>${ICONS_EDIT}</button><button class="btn-icon del" onclick="doDelete('eventos','${ev.id}')">${ICONS_DEL}</button></div>`:''}
    </div>`).join('') : `<div class="empty-wrap" style="padding:1.5rem"><div class="empty-ill" style="width:90px">${illustration('calendario')}</div><p class="empty-msg">Sin eventos este día</p></div>`}
    ` : `<div class="empty-wrap" style="padding:1rem"><p class="empty-msg" style="color:#aaa">Hacé clic en un día para ver sus eventos</p></div>`}`;
}

function selDia(d) {
  calDiaSeleccionado = calDiaSeleccionado === d ? null : d;
  renderCalendarioUI(document.getElementById('content'));
}
function cambiarMes(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  calDiaSeleccionado = null;
  renderCalendarioUI(document.getElementById('content'));
}

const ICONS_EDIT = SV+'<path d="M14.5 5.5l4 4M4 20l1-4 11-11 4 4-11 11z"/></svg>';
const ICONS_DEL = SV+'<path d="M5 7h14M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-12"/></svg>';

function fInput(key, placeholder='', type='text', opts=null) {
  const val = editItem ? (editItem[key]??'') : '';
  if (opts) return `<select id="f-${key}">${opts.map(o=>`<option value="${o.v}"${val===o.v?'selected':''}>${o.l}</option>`).join('')}</select>`;
  if (type==='textarea') return `<textarea id="f-${key}" style="height:78px">${val}</textarea>`;
  return `<input type="${type}" id="f-${key}" value="${String(val)}" placeholder="${placeholder}"/>`;
}
function fld(label,inner){return `<div style="margin-bottom:14px"><label class="field-label">${label}</label>${inner}</div>`;}
function pacOpts(){return [{v:'',l:'Seleccionar'},...pacientes.map(p=>({v:p.id,l:p.nombre}))];}

function openModal(tipo) {
  const isEdit = !!editItem;
  const titles = {nota:isEdit?'Editar nota':'Nueva nota',asistencia:isEdit?'Editar asistencia':'Registrar asistencia',conducta:isEdit?'Editar conducta':'Registrar conducta',informe:isEdit?'Editar informe':'Cargar documento',gasto:isEdit?'Editar gasto':'Agregar gasto',evento:isEdit?'Editar evento':'Nuevo evento',paciente:isEdit?'Editar paciente':'Nuevo paciente'};
  let body='';
  if(tipo==='paciente'){body=fld('Nombre',fInput('nombre'))+fld('Edad',fInput('edad','','number'))+fld('Institución',fInput('institucion'))+fld('Diagnóstico',fInput('diagnostico'))+fld('Contacto',fInput('contacto'));}
  else if(tipo==='nota'){body=fld('Paciente',fInput('paciente_id','','text',pacOpts()))+`<div class="grid2">${fld('Fecha',fInput('fecha','','date'))}${fld('Nota (1-10)',fInput('nota','','number'))}</div>`+fld('Materia',fInput('materia'))+fld('Observaciones',fInput('obs','','textarea'));}
  else if(tipo==='asistencia'){body=fld('Paciente',fInput('paciente_id','','text',pacOpts()))+fld('Fecha',fInput('fecha','','date'))+fld('Estado',fInput('estado','','text',[{v:'presente',l:'Presente'},{v:'ausente',l:'Ausente'},{v:'justificado',l:'Justificado'}]));}
  else if(tipo==='conducta'){body=fld('Paciente',fInput('paciente_id','','text',pacOpts()))+`<div class="grid2">${fld('Fecha',fInput('fecha','','date'))}${fld('Tipo',fInput('tipo','','text',[{v:'positivo',l:'Positivo'},{v:'neutro',l:'Neutro'},{v:'negativo',l:'Negativo'}]))}</div>`+fld('Descripción',fInput('descripcion','','textarea'));}
  else if(tipo==='informe'){body=fld('Paciente',fInput('paciente_id','','text',pacOpts()))+`<div class="grid2">${fld('Fecha',fInput('fecha','','date'))}${fld('Categoría',fInput('categoria','','text',[{v:'Evaluación',l:'Evaluación'},{v:'Seguimiento',l:'Seguimiento'},{v:'Informe trimestral',l:'Informe trimestral'},{v:'Comunicación familia',l:'Comunicación familia'},{v:'Otro',l:'Otro'}]))}</div>`+fld('Nombre del documento',fInput('nombre'));}
  else if(tipo==='gasto'){body=fld('Paciente',fInput('paciente_id','','text',pacOpts()))+`<div class="grid2">${fld('Fecha',fInput('fecha','','date'))}${fld('Monto ($)',fInput('monto','','number'))}</div>`+fld('Concepto',fInput('concepto'))+fld('Tipo',fInput('tipo','','text',[{v:'honorario',l:'Honorario'},{v:'material',l:'Material'},{v:'otro',l:'Otro'}]));}
  else if(tipo==='evento'){const pe=[{v:'',l:'General'},...pacientes.map(p=>({v:p.id,l:p.nombre}))];body=fld('Paciente (opcional)',fInput('paciente_id','','text',pe))+`<div class="grid2">${fld('Fecha',fInput('fecha','','date'))}${fld('Hora',fInput('hora','','time'))}</div>`+fld('Título',fInput('titulo'))+fld('Tipo',fInput('tipo','','text',[{v:'sesion',l:'Sesión'},{v:'reunion',l:'Reunión'},{v:'otro',l:'Otro'}]));}
  document.getElementById('modal-box').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <p class="pf" style="font-size:17px;font-weight:500;color:var(--navy)">${titles[tipo]}</p>
      <button onclick="closeModal()" style="background:none;border:none;font-size:23px;color:#aaa;cursor:pointer;line-height:1">×</button>
    </div>${body}
    <button class="btn-primary" onclick="saveModal('${tipo}')" style="width:100%;justify-content:center;padding:12px;margin-top:4px">Guardar</button>`;
  document.getElementById('modal-overlay').style.display='flex';
}

async function saveModal(tipo) {
  const gv = id => { const el=document.getElementById('f-'+id); return el?el.value:''; };
  const tableMap={paciente:'pacientes',nota:'notas',asistencia:'asistencias',conducta:'conductas',informe:'informes',gasto:'gastos',evento:'eventos'};
  const table=tableMap[tipo];
  let data={};
  if(tipo==='paciente') data={nombre:gv('nombre'),edad:gv('edad')||null,institucion:gv('institucion'),diagnostico:gv('diagnostico'),contacto:gv('contacto')};
  else if(tipo==='nota') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,materia:gv('materia'),nota:parseInt(gv('nota'))||null,obs:gv('obs')};
  else if(tipo==='asistencia') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,estado:gv('estado')};
  else if(tipo==='conducta') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,tipo:gv('tipo'),descripcion:gv('descripcion')};
  else if(tipo==='informe') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,categoria:gv('categoria'),nombre:gv('nombre')};
  else if(tipo==='gasto') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,concepto:gv('concepto'),monto:parseFloat(gv('monto'))||0,tipo:gv('tipo')};
  else if(tipo==='evento') data={paciente_id:gv('paciente_id')||null,fecha:gv('fecha')||null,hora:gv('hora'),titulo:gv('titulo'),tipo:gv('tipo')};
  if(editItem) await dbUpdate(table,editItem.id,data);
  else await dbInsert(table,data);
  if(tipo==='paciente') pacientes=await dbGet('pacientes');
  closeModal();
  renderTab();
}

function closeModal(){document.getElementById('modal-overlay').style.display='none';editItem=null;}
function handleOverlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
</script>
